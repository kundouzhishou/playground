<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voomba Factory — 项目看板</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0f;
    --surface: #141418;
    --surface2: #1c1c22;
    --border: #2a2a35;
    --accent: #f97316;
    --accent2: #6B21A8;
    --green: #22c55e;
    --red: #ef4444;
    --yellow: #eab308;
    --text: #e2e2e8;
    --muted: #6b6b7a;
    --mono: 'Share Tech Mono', monospace;
    --display: 'Bebas Neue', sans-serif;
    --body: 'DM Sans', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--body);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── 顶部工厂标题栏 ── */
  .factory-header {
    background: var(--surface);
    border-bottom: 2px solid var(--border);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .factory-logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .factory-logo .gear {
    font-size: 1.6rem;
    animation: spin 4s linear infinite;
    display: inline-block;
  }

  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  .factory-logo h1 {
    font-family: var(--display);
    font-size: 1.8rem;
    letter-spacing: 3px;
    color: var(--accent);
  }

  .factory-logo span {
    font-family: var(--mono);
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 2px;
  }

  .header-stats {
    display: flex;
    gap: 2rem;
    font-family: var(--mono);
    font-size: 0.75rem;
  }

  .stat {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }

  .stat-value {
    font-size: 1.4rem;
    font-family: var(--display);
    letter-spacing: 2px;
  }

  .stat-label {
    color: var(--muted);
    letter-spacing: 1px;
    font-size: 0.65rem;
  }

  .stat-value.green { color: var(--green); }
  .stat-value.orange { color: var(--accent); }
  .stat-value.red { color: var(--red); }

  /* ── 传送带背景 ── */
  .conveyor-bg {
    background: repeating-linear-gradient(
      90deg,
      transparent,
      transparent 40px,
      rgba(255,255,255,0.015) 40px,
      rgba(255,255,255,0.015) 41px
    );
    padding: 2rem;
  }

  /* ── 流水线阶段标签 ── */
  .pipeline-stages {
    display: flex;
    gap: 0;
    margin-bottom: 1.5rem;
    font-family: var(--mono);
    font-size: 0.65rem;
    letter-spacing: 2px;
    color: var(--muted);
    padding: 0 1rem;
  }

  .stage-label {
    flex: 1;
    text-align: center;
    padding: 6px;
    border-top: 1px solid var(--border);
    position: relative;
  }

  .stage-label::after {
    content: '▶';
    position: absolute;
    right: -6px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 0.5rem;
    color: var(--border);
    z-index: 1;
  }

  .stage-label:last-child::after { display: none; }

  /* ── 模块工位 ── */
  .module-section {
    margin-bottom: 2.5rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    position: relative;
  }

  .module-section::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 3px;
    background: var(--accent2);
  }

  .module-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px 12px 24px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    user-select: none;
  }

  .module-header:hover {
    background: #22222a;
  }

  .module-title {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .module-icon {
    font-size: 1rem;
  }

  .module-name {
    font-family: var(--display);
    font-size: 1.1rem;
    letter-spacing: 2px;
    color: var(--text);
  }

  .module-progress {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .progress-bar-wrap {
    width: 120px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    border-radius: 2px;
    transition: width 1s ease;
  }

  .progress-pct {
    font-family: var(--mono);
    font-size: 0.75rem;
    color: var(--accent);
    min-width: 36px;
    text-align: right;
  }

  .collapse-icon {
    color: var(--muted);
    font-size: 0.7rem;
    transition: transform 0.2s;
  }

  .module-section.collapsed .collapse-icon {
    transform: rotate(-90deg);
  }

  /* ── 传送带 ── */
  .conveyor-track {
    padding: 16px 20px 20px 24px;
    position: relative;
    overflow: hidden;
  }

  .conveyor-track::before {
    content: '';
    position: absolute;
    bottom: 28px;
    left: 0;
    right: 0;
    height: 2px;
    background: repeating-linear-gradient(
      90deg,
      var(--border) 0px,
      var(--border) 12px,
      transparent 12px,
      transparent 20px
    );
    animation: belt 1s linear infinite;
  }

  @keyframes belt {
    from { background-position: 0 0; }
    to { background-position: 32px 0; }
  }

  .tasks-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }

  /* ── 零件卡片 ── */
  .task-card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 10px 12px;
    min-width: 200px;
    max-width: 260px;
    flex: 1;
    position: relative;
    transition: transform 0.2s, border-color 0.2s;
    animation: slideIn 0.4s ease both;
  }

  .task-card:hover {
    transform: translateY(-2px);
    border-color: var(--accent2);
  }

  .task-card.done {
    border-color: rgba(34, 197, 94, 0.3);
    background: rgba(34, 197, 94, 0.03);
  }

  .task-card.done::after {
    content: '✓';
    position: absolute;
    top: 6px;
    right: 8px;
    color: var(--green);
    font-size: 0.75rem;
    font-family: var(--mono);
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-10px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .task-name {
    font-size: 0.8rem;
    color: var(--text);
    margin-bottom: 8px;
    line-height: 1.4;
    padding-right: 16px;
  }

  .task-card.done .task-name {
    color: var(--muted);
  }

  /* ── 三灯指示器 ── */
  .task-lights {
    display: flex;
    gap: 6px;
    align-items: center;
  }

  .light {
    display: flex;
    align-items: center;
    gap: 3px;
    font-family: var(--mono);
    font-size: 0.6rem;
    color: var(--muted);
  }

  .light-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--border);
    position: relative;
  }

  .light-dot.on-green {
    background: var(--green);
    box-shadow: 0 0 6px var(--green);
    animation: pulse-green 2s ease-in-out infinite;
  }

  .light-dot.on-red {
    background: var(--red);
    box-shadow: 0 0 4px var(--red);
  }

  .light-dot.na {
    background: var(--border);
    opacity: 0.4;
  }

  @keyframes pulse-green {
    0%, 100% { box-shadow: 0 0 4px var(--green); }
    50% { box-shadow: 0 0 10px var(--green); }
  }

  /* ── 底部传送带装饰 ── */
  .belt-decoration {
    height: 12px;
    background: repeating-linear-gradient(
      90deg,
      var(--surface2) 0px,
      var(--surface2) 20px,
      var(--border) 20px,
      var(--border) 22px
    );
    animation: belt 0.5s linear infinite;
    border-top: 1px solid var(--border);
  }

  /* ── 折叠 ── */
  .module-section.collapsed .conveyor-track,
  .module-section.collapsed .belt-decoration {
    display: none;
  }

  /* ── 底部状态栏 ── */
  .factory-footer {
    background: var(--surface);
    border-top: 2px solid var(--border);
    padding: 10px 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-family: var(--mono);
    font-size: 0.65rem;
    color: var(--muted);
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
  }

  .status-dot {
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 6px var(--green);
    margin-right: 6px;
    animation: pulse-green 2s ease-in-out infinite;
  }

  .ticker {
    overflow: hidden;
    white-space: nowrap;
  }

  .ticker-inner {
    display: inline-block;
    animation: ticker 20s linear infinite;
  }

  @keyframes ticker {
    from { transform: translateX(100%); }
    to { transform: translateX(-100%); }
  }

  /* ── 主内容区 ── */
  main {
    padding: 1.5rem 2rem 5rem;
    max-width: 1400px;
    margin: 0 auto;
  }

  /* ── 噪点纹理 ── */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 999;
    opacity: 0.4;
  }

  /* ── 响应式 ── */
  @media (max-width: 600px) {
    .header-stats { gap: 1rem; }
    .task-card { min-width: 160px; }
    main { padding: 1rem 1rem 5rem; }
  }
</style>
</head>
<body>

<header class="factory-header">
  <div class="factory-logo">
    <span class="gear">⚙</span>
    <div>
      <h1>VOOMBA FACTORY</h1>
      <span>PROJECT STATUS BOARD</span>
    </div>
  </div>
  <div class="header-stats" id="header-stats">
    <div class="stat">
      <span class="stat-value green" id="stat-done">0</span>
      <span class="stat-label">完成</span>
    </div>
    <div class="stat">
      <span class="stat-value orange" id="stat-wip">0</span>
      <span class="stat-label">进行中</span>
    </div>
    <div class="stat">
      <span class="stat-value red" id="stat-todo">0</span>
      <span class="stat-label">待开发</span>
    </div>
  </div>
</header>

<main id="main-content"></main>

<footer class="factory-footer">
  <div><span class="status-dot"></span>FACTORY ONLINE · VOOMBA v0.1</div>
  <div class="ticker">
    <span class="ticker-inner" id="ticker-text">正在加载生产数据...</span>
  </div>
  <div id="footer-time" style="font-family:var(--mono);font-size:0.65rem;color:var(--muted)"></div>
</footer>

<script>
// ── 数据源（从 roadmap.md 解析而来）──
const ROADMAP = [
  {
    name: "AUTH 认证", icon: "🔐",
    tasks: [
      { name: "发送 OTP 短信",           dev: true,  ui: true,  test: true  },
      { name: "验证 OTP 登录",           dev: true,  ui: true,  test: true  },
      { name: "OTP 重发实际调用 API",    dev: false, ui: true,  test: false },
      { name: "Token 持久化 AsyncStorage", dev: false, ui: null, test: false },
      { name: "清理冗余导航文件",        dev: false, ui: null,  test: null  },
    ]
  },
  {
    name: "行程主流程", icon: "🛵",
    tasks: [
      { name: "欢迎首页",               dev: true,  ui: true,  test: null  },
      { name: "目的地选择（静态数据）", dev: true,  ui: true,  test: null  },
      { name: "价格确认页",             dev: true,  ui: true,  test: null  },
      { name: "等待司机页",             dev: true,  ui: true,  test: null  },
      { name: "行程中页面",             dev: true,  ui: true,  test: null  },
      { name: "完成评分页",             dev: true,  ui: true,  test: null  },
      { name: "GPS 真实定位",           dev: false, ui: false, test: false },
      { name: "取消叫车通知后端",       dev: false, ui: true,  test: false },
      { name: "SOS 拨号功能",           dev: false, ui: true,  test: false },
      { name: "完成提交失败提示",       dev: false, ui: false, test: false },
    ]
  },
  {
    name: "后端 API", icon: "⚡",
    tasks: [
      { name: "Auth send-code",          dev: true,  ui: null,  test: true  },
      { name: "Auth verify",             dev: true,  ui: null,  test: false },
      { name: "Rides create",            dev: true,  ui: null,  test: null  },
      { name: "Rides cancel",            dev: true,  ui: null,  test: null  },
      { name: "Rides list",              dev: true,  ui: null,  test: null  },
      { name: "价格估算接口 /estimate",  dev: false, ui: null,  test: false },
      { name: "JWT Secret 环境变量",     dev: false, ui: null,  test: null  },
      { name: "修复 auth.test c.env",    dev: false, ui: null,  test: false },
    ]
  },
  {
    name: "前后端联调", icon: "🔗",
    tasks: [
      { name: "api.js 替换真实 HTTP",    dev: false, ui: null,  test: false },
      { name: "接口字段对齐（坐标）",    dev: false, ui: null,  test: false },
      { name: "JWT 认证 header 接入",    dev: false, ui: null,  test: false },
    ]
  },
  {
    name: "司机端", icon: "🏍",
    tasks: [
      { name: "司机注册 / 登录",         dev: false, ui: false, test: false },
      { name: "司机接单界面",            dev: false, ui: false, test: false },
      { name: "实时位置上报",            dev: false, ui: false, test: false },
      { name: "司机匹配逻辑",            dev: false, ui: null,  test: false },
    ]
  },
  {
    name: "SMS / 通知", icon: "📱",
    tasks: [
      { name: "SMS 发送 stub",           dev: true,  ui: null,  test: null  },
      { name: "接入真实 SMS 供应商",     dev: false, ui: null,  test: false },
      { name: "行程状态推送通知",        dev: false, ui: false, test: false },
    ]
  },
  {
    name: "历史记录", icon: "📋",
    tasks: [
      { name: "历史记录页面",            dev: true,  ui: true,  test: null  },
      { name: "接入真实历史 API",        dev: false, ui: true,  test: false },
    ]
  },
  {
    name: "个人资料", icon: "👤",
    tasks: [
      { name: "个人资料页面",            dev: true,  ui: true,  test: null  },
      { name: "编辑资料功能",            dev: false, ui: false, test: false },
      { name: "退出登录",                dev: false, ui: false, test: false },
    ]
  },
];

// ── 判断任务是否完成 ──
function isDone(task) {
  const dims = [task.dev, task.ui, task.test].filter(v => v !== null);
  return dims.length > 0 && dims.every(v => v === true);
}

// ── 计算模块进度 ──
function moduleProgress(tasks) {
  const done = tasks.filter(isDone).length;
  return { done, total: tasks.length, pct: Math.round(done / tasks.length * 100) };
}

// ── 渲染指示灯 ──
function renderLight(label, val) {
  let cls = 'na';
  if (val === true) cls = 'on-green';
  else if (val === false) cls = 'on-red';
  return `<span class="light"><span class="light-dot ${cls}"></span>${label}</span>`;
}

// ── 渲染任务卡片 ──
function renderCard(task, idx) {
  const done = isDone(task);
  return `
    <div class="task-card ${done ? 'done' : ''}" style="animation-delay:${idx * 0.05}s">
      <div class="task-name">${task.name}</div>
      <div class="task-lights">
        ${renderLight('DEV', task.dev)}
        ${renderLight('UI', task.ui)}
        ${renderLight('TEST', task.test)}
      </div>
    </div>`;
}

// ── 渲染模块 ──
function renderModule(mod, idx) {
  const { done, total, pct } = moduleProgress(mod.tasks);
  const cards = mod.tasks.map((t, i) => renderCard(t, i)).join('');
  return `
    <div class="module-section" id="mod-${idx}">
      <div class="module-header" onclick="toggleModule(${idx})">
        <div class="module-title">
          <span class="module-icon">${mod.icon}</span>
          <span class="module-name">${mod.name}</span>
        </div>
        <div class="module-progress">
          <div class="progress-bar-wrap">
            <div class="progress-bar-fill" style="width:${pct}%"></div>
          </div>
          <span class="progress-pct">${done}/${total}</span>
          <span class="collapse-icon">▼</span>
        </div>
      </div>
      <div class="conveyor-track">
        <div class="tasks-grid">${cards}</div>
      </div>
      <div class="belt-decoration"></div>
    </div>`;
}

// ── 折叠/展开 ──
function toggleModule(idx) {
  document.getElementById(`mod-${idx}`).classList.toggle('collapsed');
}

// ── 统计 ──
function calcStats() {
  let done = 0, wip = 0, todo = 0;
  ROADMAP.forEach(mod => {
    mod.tasks.forEach(task => {
      if (isDone(task)) { done++; return; }
      const dims = [task.dev, task.ui, task.test].filter(v => v !== null);
      const anyDone = dims.some(v => v === true);
      if (anyDone) wip++;
      else todo++;
    });
  });
  return { done, wip, todo };
}

// ── 初始化 ──
function init() {
  const main = document.getElementById('main-content');
  main.innerHTML = ROADMAP.map((mod, i) => renderModule(mod, i)).join('');

  const { done, wip, todo } = calcStats();
  document.getElementById('stat-done').textContent = done;
  document.getElementById('stat-wip').textContent = wip;
  document.getElementById('stat-todo').textContent = todo;

  const total = done + wip + todo;
  document.getElementById('ticker-text').textContent =
    `⚙ 总任务 ${total} 项 · 已完成 ${done} 项 · 进行中 ${wip} 项 · 待开发 ${todo} 项 · 整体进度 ${Math.round(done/total*100)}% · VOOMBA FACTORY ONLINE ·`;

  // 时钟
  function tick() {
    const now = new Date();
    document.getElementById('footer-time').textContent =
      now.toISOString().replace('T', ' ').slice(0, 19) + ' UTC';
  }
  tick();
  setInterval(tick, 1000);
}

init();
</script>
</body>
</html>
