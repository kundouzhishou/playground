<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voomba Factory — 项目看板</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0f;
    --surface: #141418;
    --surface2: #1c1c22;
    --border: #2a2a35;
    --accent: #f97316;
    --accent2: #6B21A8;
    --green: #22c55e;
    --red: #ef4444;
    --yellow: #eab308;
    --text: #e2e2e8;
    --muted: #6b6b7a;
    --mono: 'Share Tech Mono', monospace;
    --display: 'Bebas Neue', sans-serif;
    --body: 'DM Sans', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--body);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── 顶部工厂标题栏 ── */
  .factory-header {
    background: var(--surface);
    border-bottom: 2px solid var(--border);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .factory-logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .factory-logo .gear {
    font-size: 1.6rem;
    animation: spin 4s linear infinite;
    display: inline-block;
  }

  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  .factory-logo h1 {
    font-family: var(--display);
    font-size: 1.8rem;
    letter-spacing: 3px;
    color: var(--accent);
  }

  .factory-logo span {
    font-family: var(--mono);
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 2px;
  }

  .header-stats {
    display: flex;
    gap: 2rem;
    font-family: var(--mono);
    font-size: 0.75rem;
  }

  .stat {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }

  .stat-value {
    font-size: 1.4rem;
    font-family: var(--display);
    letter-spacing: 2px;
  }

  .stat-label {
    color: var(--muted);
    letter-spacing: 1px;
    font-size: 0.65rem;
  }

  .stat-value.green { color: var(--green); }
  .stat-value.orange { color: var(--accent); }
  .stat-value.red { color: var(--red); }

  /* ── 传送带背景 ── */
  .conveyor-bg {
    background: repeating-linear-gradient(
      90deg,
      transparent,
      transparent 40px,
      rgba(255,255,255,0.015) 40px,
      rgba(255,255,255,0.015) 41px
    );
    padding: 2rem;
  }

  /* ── 流水线阶段标签 ── */
  .pipeline-stages {
    display: flex;
    gap: 0;
    margin-bottom: 1.5rem;
    font-family: var(--mono);
    font-size: 0.65rem;
    letter-spacing: 2px;
    color: var(--muted);
    padding: 0 1rem;
  }

  .stage-label {
    flex: 1;
    text-align: center;
    padding: 6px;
    border-top: 1px solid var(--border);
    position: relative;
  }

  .stage-label::after {
    content: '▶';
    position: absolute;
    right: -6px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 0.5rem;
    color: var(--border);
    z-index: 1;
  }

  .stage-label:last-child::after { display: none; }

  /* ── 模块工位 ── */
  .module-section {
    margin-bottom: 2.5rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    position: relative;
  }

  .module-section::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 3px;
    background: var(--accent2);
  }

  .module-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px 12px 24px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    user-select: none;
  }

  .module-header:hover {
    background: #22222a;
  }

  .module-title {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .module-icon {
    font-size: 1rem;
  }

  .module-name {
    font-family: var(--display);
    font-size: 1.1rem;
    letter-spacing: 2px;
    color: var(--text);
  }

  .module-progress {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .progress-bar-wrap {
    width: 120px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    border-radius: 2px;
    transition: width 1s ease;
  }

  .progress-pct {
    font-family: var(--mono);
    font-size: 0.75rem;
    color: var(--accent);
    min-width: 36px;
    text-align: right;
  }

  .collapse-icon {
    color: var(--muted);
    font-size: 0.7rem;
    transition: transform 0.2s;
  }

  .module-section.collapsed .collapse-icon {
    transform: rotate(-90deg);
  }

  /* ── 传送带 ── */
  .conveyor-track {
    padding: 16px 20px 20px 24px;
    position: relative;
    overflow: hidden;
  }

  .conveyor-track::before {
    content: '';
    position: absolute;
    bottom: 28px;
    left: 0;
    right: 0;
    height: 2px;
    background: repeating-linear-gradient(
      90deg,
      var(--border) 0px,
      var(--border) 12px,
      transparent 12px,
      transparent 20px
    );
    animation: belt 1s linear infinite;
  }

  @keyframes belt {
    from { background-position: 0 0; }
    to { background-position: 32px 0; }
  }

  .tasks-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }

  /* ── 零件卡片 ── */
  .task-card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 10px 12px;
    min-width: 200px;
    max-width: 260px;
    flex: 1;
    position: relative;
    transition: transform 0.2s, border-color 0.2s;
    animation: slideIn 0.4s ease both;
  }

  .task-card:hover {
    transform: translateY(-2px);
    border-color: var(--accent2);
  }

  .task-card.done {
    border-color: rgba(34, 197, 94, 0.3);
    background: rgba(34, 197, 94, 0.03);
  }

  .task-card.done::after {
    content: '✓';
    position: absolute;
    top: 6px;
    right: 8px;
    color: var(--green);
    font-size: 0.75rem;
    font-family: var(--mono);
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-10px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .task-name {
    font-size: 0.8rem;
    color: var(--text);
    margin-bottom: 8px;
    line-height: 1.4;
    padding-right: 16px;
  }

  .task-card.done .task-name {
    color: var(--muted);
  }

  /* ── 三灯指示器 ── */
  .task-lights {
    display: flex;
    gap: 6px;
    align-items: center;
  }

  .light {
    display: flex;
    align-items: center;
    gap: 3px;
    font-family: var(--mono);
    font-size: 0.6rem;
    color: var(--muted);
  }

  .light-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--border);
    position: relative;
  }

  .light-dot.on-green {
    background: var(--green);
    box-shadow: 0 0 6px var(--green);
    animation: pulse-green 2s ease-in-out infinite;
  }

  .light-dot.on-red {
    background: var(--red);
    box-shadow: 0 0 4px var(--red);
  }

  .light-dot.na {
    background: var(--border);
    opacity: 0.4;
  }

  @keyframes pulse-green {
    0%, 100% { box-shadow: 0 0 4px var(--green); }
    50% { box-shadow: 0 0 10px var(--green); }
  }

  /* ── 底部传送带装饰 ── */
  .belt-decoration {
    height: 12px;
    background: repeating-linear-gradient(
      90deg,
      var(--surface2) 0px,
      var(--surface2) 20px,
      var(--border) 20px,
      var(--border) 22px
    );
    animation: belt 0.5s linear infinite;
    border-top: 1px solid var(--border);
  }

  /* ── 折叠 ── */
  .module-section.collapsed .conveyor-track,
  .module-section.collapsed .belt-decoration {
    display: none;
  }

  /* ── 底部状态栏 ── */
  .factory-footer {
    background: var(--surface);
    border-top: 2px solid var(--border);
    padding: 10px 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-family: var(--mono);
    font-size: 0.65rem;
    color: var(--muted);
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
  }

  .status-dot {
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 6px var(--green);
    margin-right: 6px;
    animation: pulse-green 2s ease-in-out infinite;
  }

  .ticker {
    overflow: hidden;
    white-space: nowrap;
  }

  .ticker-inner {
    display: inline-block;
    animation: ticker 20s linear infinite;
  }

  @keyframes ticker {
    from { transform: translateX(100%); }
    to { transform: translateX(-100%); }
  }

  /* ── 主内容区 ── */
  main {
    padding: 1.5rem 2rem 5rem;
    max-width: 1400px;
    margin: 0 auto;
  }

  /* ── 噪点纹理 ── */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 999;
    opacity: 0.4;
  }

  /* ── 响应式 ── */
  @media (max-width: 600px) {
    .header-stats { gap: 1rem; }
    .task-card { min-width: 160px; }
    main { padding: 1rem 1rem 5rem; }
  }
</style>
</head>
<body>

<header class="factory-header">
  <div class="factory-logo">
    <span class="gear">⚙</span>
    <div>
      <h1>VOOMBA FACTORY</h1>
      <span>PROJECT STATUS BOARD</span>
    </div>
  </div>
  <div class="header-stats" id="header-stats">
    <div class="stat">
      <span class="stat-value green" id="stat-done">0</span>
      <span class="stat-label">完成</span>
    </div>
    <div class="stat">
      <span class="stat-value orange" id="stat-wip">0</span>
      <span class="stat-label">进行中</span>
    </div>
    <div class="stat">
      <span class="stat-value red" id="stat-todo">0</span>
      <span class="stat-label">待开发</span>
    </div>
  </div>
</header>

<main id="main-content"></main>

<footer class="factory-footer">
  <div><span class="status-dot"></span>FACTORY ONLINE · VOOMBA v0.1</div>
  <div class="ticker">
    <span class="ticker-inner" id="ticker-text">正在加载生产数据...</span>
  </div>
  <div style="display:flex;gap:1.5rem;align-items:center">
    <span id="last-updated" style="color:var(--muted)"></span>
    <span id="footer-time"></span>
  </div>
</footer>

<script>
// ── 数据源：从 GitHub raw 拉取 roadmap.md 实时解析 ──
const ROADMAP_URL = 'https://raw.githubusercontent.com/kundouzhishou/voomba/main/roadmap.md';
const POLL_INTERVAL = 30000; // 30 秒轮询一次

// 模块图标映射
const MODULE_ICONS = {
  'auth': '🔐', '认证': '🔐',
  '行程': '🛵', 'ride': '🛵',
  '后端': '⚡', 'api': '⚡',
  '联调': '🔗',
  '司机': '🏍',
  'sms': '📱', '通知': '📱',
  '历史': '📋',
  '资料': '👤', 'profile': '👤',
  '阶段': '🔧',
};

function getIcon(name) {
  const lower = name.toLowerCase();
  for (const [key, icon] of Object.entries(MODULE_ICONS)) {
    if (lower.includes(key)) return icon;
  }
  return '📦';
}

// 解析 [dev: ✅/❌/—] 格式
function parseDim(str) {
  if (!str) return null;
  if (str.includes('✅')) return true;
  if (str.includes('❌')) return false;
  if (str.includes('—') || str.includes('-')) return null;
  return null;
}

// 解析单行任务
function parseTask(line) {
  // 匹配：- [ ] 或 - [x] 开头的行
  const taskMatch = line.match(/^-\s*\[[ xX]\]\s*(.+)/);
  if (!taskMatch) return null;

  const rest = taskMatch[1];
  const devMatch  = rest.match(/\[dev:\s*([^\]]+)\]/);
  const uiMatch   = rest.match(/\[ui:\s*([^\]]+)\]/);
  const testMatch = rest.match(/\[test:\s*([^\]]+)\]/);

  // 任务名：去掉所有 [...] 标签
  const name = rest.replace(/\[(?:dev|ui|test):[^\]]*\]/g, '').trim();

  return {
    name,
    dev:  devMatch  ? parseDim(devMatch[1])  : null,
    ui:   uiMatch   ? parseDim(uiMatch[1])   : null,
    test: testMatch ? parseDim(testMatch[1]) : null,
  };
}

// 解析整个 roadmap.md 文本
function parseRoadmap(md) {
  const lines = md.split('\n');
  const modules = [];
  let current = null;

  for (const line of lines) {
    // 二级标题 = 模块
    const h2 = line.match(/^##\s+(.+)/);
    if (h2) {
      if (current) modules.push(current);
      const name = h2[1].trim();
      current = { name, icon: getIcon(name), tasks: [] };
      continue;
    }
    // 任务行
    if (current) {
      const task = parseTask(line);
      if (task && task.name) current.tasks.push(task);
    }
  }
  if (current && current.tasks.length > 0) modules.push(current);

  // 过滤掉空模块
  return modules.filter(m => m.tasks.length > 0);
}

let ROADMAP = [];

// ── 判断任务是否完成 ──
function isDone(task) {
  const dims = [task.dev, task.ui, task.test].filter(v => v !== null);
  return dims.length > 0 && dims.every(v => v === true);
}

// ── 计算模块进度 ──
function moduleProgress(tasks) {
  const done = tasks.filter(isDone).length;
  return { done, total: tasks.length, pct: Math.round(done / tasks.length * 100) };
}

// ── 渲染指示灯 ──
function renderLight(label, val) {
  let cls = 'na';
  if (val === true) cls = 'on-green';
  else if (val === false) cls = 'on-red';
  return `<span class="light"><span class="light-dot ${cls}"></span>${label}</span>`;
}

// ── 渲染任务卡片 ──
function renderCard(task, idx) {
  const done = isDone(task);
  return `
    <div class="task-card ${done ? 'done' : ''}" style="animation-delay:${idx * 0.05}s">
      <div class="task-name">${task.name}</div>
      <div class="task-lights">
        ${renderLight('DEV', task.dev)}
        ${renderLight('UI', task.ui)}
        ${renderLight('TEST', task.test)}
      </div>
    </div>`;
}

// ── 渲染模块 ──
function renderModule(mod, idx) {
  const { done, total, pct } = moduleProgress(mod.tasks);
  const cards = mod.tasks.map((t, i) => renderCard(t, i)).join('');
  return `
    <div class="module-section" id="mod-${idx}">
      <div class="module-header" onclick="toggleModule(${idx})">
        <div class="module-title">
          <span class="module-icon">${mod.icon}</span>
          <span class="module-name">${mod.name}</span>
        </div>
        <div class="module-progress">
          <div class="progress-bar-wrap">
            <div class="progress-bar-fill" style="width:${pct}%"></div>
          </div>
          <span class="progress-pct">${done}/${total}</span>
          <span class="collapse-icon">▼</span>
        </div>
      </div>
      <div class="conveyor-track">
        <div class="tasks-grid">${cards}</div>
      </div>
      <div class="belt-decoration"></div>
    </div>`;
}

// ── 折叠/展开 ──
function toggleModule(idx) {
  document.getElementById(`mod-${idx}`).classList.toggle('collapsed');
}

// ── 统计 ──
function calcStats() {
  let done = 0, wip = 0, todo = 0;
  ROADMAP.forEach(mod => {
    mod.tasks.forEach(task => {
      if (isDone(task)) { done++; return; }
      const dims = [task.dev, task.ui, task.test].filter(v => v !== null);
      const anyDone = dims.some(v => v === true);
      if (anyDone) wip++;
      else todo++;
    });
  });
  return { done, wip, todo };
}

// ── 渲染看板 ──
function render() {
  const main = document.getElementById('main-content');
  // 保留已折叠状态
  const collapsed = new Set(
    [...document.querySelectorAll('.module-section.collapsed')]
      .map(el => el.id)
  );
  main.innerHTML = ROADMAP.map((mod, i) => renderModule(mod, i)).join('');
  collapsed.forEach(id => {
    const el = document.getElementById(id);
    if (el) el.classList.add('collapsed');
  });

  const { done, wip, todo } = calcStats();
  document.getElementById('stat-done').textContent = done;
  document.getElementById('stat-wip').textContent = wip;
  document.getElementById('stat-todo').textContent = todo;

  const total = done + wip + todo;
  document.getElementById('ticker-text').textContent =
    `⚙ 总任务 ${total} 项 · 已完成 ${done} 项 · 进行中 ${wip} 项 · 待开发 ${todo} 项 · 整体进度 ${Math.round(done/total*100)}% · VOOMBA FACTORY ONLINE ·`;
}

// ── 拉取 roadmap.md 并更新 ──
let lastEtag = '';
async function fetchRoadmap() {
  try {
    // 加时间戳绕过 CDN 缓存
    const url = ROADMAP_URL + '?t=' + Date.now();
    const res = await fetch(url);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const text = await res.text();
    const etag = text.slice(0, 200); // 用内容前缀做简单变更检测
    if (etag !== lastEtag) {
      lastEtag = etag;
      ROADMAP = parseRoadmap(text);
      render();
      setLastUpdated();
    }
    setStatus('online');
  } catch (e) {
    setStatus('error');
    console.warn('roadmap fetch failed:', e);
  }
}

function setLastUpdated() {
  const now = new Date();
  document.getElementById('last-updated').textContent =
    '上次更新 ' + now.toISOString().replace('T', ' ').slice(0, 19) + ' UTC';
}

function setStatus(state) {
  const dot = document.querySelector('.status-dot');
  if (state === 'online') {
    dot.style.background = 'var(--green)';
    dot.style.boxShadow = '0 0 6px var(--green)';
  } else {
    dot.style.background = 'var(--red)';
    dot.style.boxShadow = '0 0 6px var(--red)';
  }
}

// ── 初始化 ──
async function init() {
  // 时钟
  function tick() {
    const now = new Date();
    document.getElementById('footer-time').textContent =
      now.toISOString().replace('T', ' ').slice(0, 19) + ' UTC';
  }
  tick();
  setInterval(tick, 1000);

  // 首次加载
  document.getElementById('main-content').innerHTML =
    '<div style="text-align:center;padding:4rem;font-family:var(--mono);color:var(--muted);letter-spacing:2px">⚙ 正在拉取生产数据...</div>';
  await fetchRoadmap();

  // 轮询
  setInterval(fetchRoadmap, POLL_INTERVAL);
}

init();
</script>
</body>
</html>
