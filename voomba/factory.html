<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voomba Factory — 项目看板</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0f;
    --surface: #141418;
    --surface2: #1c1c22;
    --border: #2a2a35;
    --accent: #f97316;
    --accent2: #6B21A8;
    --green: #22c55e;
    --red: #ef4444;
    --yellow: #eab308;
    --text: #e2e2e8;
    --muted: #6b6b7a;
    --mono: 'Share Tech Mono', monospace;
    --display: 'Bebas Neue', sans-serif;
    --body: 'DM Sans', sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: var(--body); min-height: 100vh; overflow-x: hidden; }

  /* ── 顶部标题栏 ── */
  .factory-header {
    background: var(--surface); border-bottom: 2px solid var(--border);
    padding: 0 2rem; display: flex; align-items: center; justify-content: space-between;
    height: 64px; position: sticky; top: 0; z-index: 100;
  }
  .factory-logo { display: flex; align-items: center; gap: 12px; }
  .factory-logo .gear { font-size: 1.6rem; animation: spin 4s linear infinite; display: inline-block; }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  .factory-logo h1 { font-family: var(--display); font-size: 1.8rem; letter-spacing: 3px; color: var(--accent); }
  .factory-logo span { font-family: var(--mono); font-size: 0.7rem; color: var(--muted); letter-spacing: 2px; }
  .header-stats { display: flex; gap: 2rem; font-family: var(--mono); font-size: 0.75rem; }
  .stat { display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .stat-value { font-size: 1.4rem; font-family: var(--display); letter-spacing: 2px; }
  .stat-label { color: var(--muted); letter-spacing: 1px; font-size: 0.65rem; }
  .stat-value.green { color: var(--green); }
  .stat-value.orange { color: var(--accent); }
  .stat-value.red { color: var(--red); }

  /* ── 布局：主内容 + 右侧日志 ── */
  .layout { display: flex; gap: 0; align-items: flex-start; }
  main { flex: 1; padding: 1.5rem 2rem 5rem; min-width: 0; }
  .changelog-panel {
    width: 280px; flex-shrink: 0; position: sticky; top: 80px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 4px; margin: 1.5rem 1.5rem 0 0; overflow: hidden;
    max-height: calc(100vh - 120px);
  }
  .changelog-header {
    padding: 10px 14px; background: var(--surface2); border-bottom: 1px solid var(--border);
    font-family: var(--mono); font-size: 0.65rem; letter-spacing: 2px; color: var(--accent);
    display: flex; align-items: center; gap: 8px;
  }
  .changelog-body { overflow-y: auto; max-height: calc(100vh - 200px); }
  .log-entry {
    padding: 10px 14px; border-bottom: 1px solid var(--border);
    animation: logSlide 0.4s ease both;
  }
  @keyframes logSlide { from { opacity: 0; transform: translateX(10px); } to { opacity: 1; transform: translateX(0); } }
  .log-entry:last-child { border-bottom: none; }
  .log-task { font-size: 0.75rem; color: var(--text); display: block; margin-bottom: 4px; line-height: 1.4; }
  .log-meta { display: flex; gap: 6px; align-items: center; }
  .log-dim {
    font-family: var(--mono); font-size: 0.6rem; padding: 1px 5px;
    border-radius: 2px; background: var(--surface2); color: var(--muted);
  }
  .log-status-ok { color: var(--green); font-size: 0.7rem; }
  .log-status-fail { color: var(--red); font-size: 0.7rem; }
  .log-time { font-family: var(--mono); font-size: 0.6rem; color: var(--muted); margin-left: auto; }
  .log-empty { padding: 20px 14px; font-family: var(--mono); font-size: 0.65rem; color: var(--muted); text-align: center; }

  /* ── 模块工位 ── */
  .module-section {
    margin-bottom: 2.5rem; background: var(--surface); border: 1px solid var(--border);
    border-radius: 4px; overflow: hidden; position: relative;
  }
  .module-section::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--accent2);
  }
  .module-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 20px 12px 24px; background: var(--surface2);
    border-bottom: 1px solid var(--border); cursor: pointer; user-select: none;
  }
  .module-header:hover { background: #22222a; }
  .module-title { display: flex; align-items: center; gap: 10px; }
  .module-icon { font-size: 1rem; }
  .module-name { font-family: var(--display); font-size: 1.1rem; letter-spacing: 2px; color: var(--text); }
  .module-progress { display: flex; align-items: center; gap: 12px; }
  .progress-bar-wrap { width: 120px; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent2), var(--accent)); border-radius: 2px; transition: width 1s ease; }
  .progress-pct { font-family: var(--mono); font-size: 0.75rem; color: var(--accent); min-width: 36px; text-align: right; }
  .collapse-icon { color: var(--muted); font-size: 0.7rem; transition: transform 0.2s; }
  .module-section.collapsed .collapse-icon { transform: rotate(-90deg); }

  /* ── 传送带 ── */
  .conveyor-track { padding: 16px 20px 20px 24px; position: relative; overflow: hidden; }
  .conveyor-track::before {
    content: ''; position: absolute; bottom: 28px; left: 0; right: 0; height: 2px;
    background: repeating-linear-gradient(90deg, var(--border) 0px, var(--border) 12px, transparent 12px, transparent 20px);
    animation: belt 1s linear infinite;
  }
  @keyframes belt { from { background-position: 0 0; } to { background-position: 32px 0; } }
  .tasks-grid { display: flex; flex-wrap: wrap; gap: 10px; }

  /* ── 零件卡片 ── */
  .task-card {
    background: var(--bg); border: 1px solid var(--border); border-radius: 3px;
    padding: 10px 12px; min-width: 200px; max-width: 260px; flex: 1; position: relative;
    transition: transform 0.2s, border-color 0.3s, background 0.3s, box-shadow 0.3s;
    animation: slideIn 0.4s ease both;
  }
  .task-card:hover { transform: translateY(-2px); border-color: var(--accent2); }
  .task-card.done { border-color: rgba(34,197,94,0.3); background: rgba(34,197,94,0.03); }
  .task-card.done::after {
    content: '✓'; position: absolute; top: 6px; right: 8px;
    color: var(--green); font-size: 0.75rem; font-family: var(--mono);
  }
  /* 变更高亮动画 */
  .task-card.just-changed {
    border-color: var(--green) !important;
    background: rgba(34,197,94,0.08) !important;
    box-shadow: 0 0 16px rgba(34,197,94,0.3);
    animation: slideIn 0.4s ease both, flashGreen 1.5s ease 3;
  }
  @keyframes flashGreen {
    0%, 100% { box-shadow: 0 0 8px rgba(34,197,94,0.2); }
    50% { box-shadow: 0 0 24px rgba(34,197,94,0.7); border-color: var(--green); }
  }
  @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
  .task-name { font-size: 0.8rem; color: var(--text); margin-bottom: 8px; line-height: 1.4; padding-right: 16px; }
  .task-card.done .task-name { color: var(--muted); }

  /* ── 三灯指示器 ── */
  .task-lights { display: flex; gap: 6px; align-items: center; }
  .light { display: flex; align-items: center; gap: 3px; font-family: var(--mono); font-size: 0.6rem; color: var(--muted); }
  .light-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--border); }
  .light-dot.on-green { background: var(--green); box-shadow: 0 0 6px var(--green); animation: pulse-green 2s ease-in-out infinite; }
  .light-dot.on-red { background: var(--red); box-shadow: 0 0 4px var(--red); }
  .light-dot.na { background: var(--border); opacity: 0.4; }
  @keyframes pulse-green { 0%,100% { box-shadow: 0 0 4px var(--green); } 50% { box-shadow: 0 0 10px var(--green); } }

  /* ── 传送带装饰 ── */
  .belt-decoration {
    height: 12px;
    background: repeating-linear-gradient(90deg, var(--surface2) 0px, var(--surface2) 20px, var(--border) 20px, var(--border) 22px);
    animation: belt 0.5s linear infinite; border-top: 1px solid var(--border);
  }
  .module-section.collapsed .conveyor-track,
  .module-section.collapsed .belt-decoration { display: none; }

  /* ── 底部状态栏 ── */
  .factory-footer {
    background: var(--surface); border-top: 2px solid var(--border);
    padding: 10px 2rem; display: flex; align-items: center; justify-content: space-between;
    font-family: var(--mono); font-size: 0.65rem; color: var(--muted);
    position: fixed; bottom: 0; left: 0; right: 0;
  }
  .status-dot {
    display: inline-block; width: 6px; height: 6px; border-radius: 50%;
    background: var(--green); box-shadow: 0 0 6px var(--green); margin-right: 6px;
    animation: pulse-green 2s ease-in-out infinite;
  }
  .ticker { overflow: hidden; white-space: nowrap; }
  .ticker-inner { display: inline-block; animation: ticker 20s linear infinite; }
  @keyframes ticker { from { transform: translateX(100%); } to { transform: translateX(-100%); } }

  /* ── 噪点纹理 ── */
  body::after {
    content: ''; position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 999; opacity: 0.4;
  }

  /* ── 响应式 ── */
  @media (max-width: 900px) {
    .changelog-panel { display: none; }
    .header-stats { gap: 1rem; }
    .task-card { min-width: 160px; }
    main { padding: 1rem 1rem 5rem; }
  }
</style>
</head>
<body>
<header class="factory-header">
  <div class="factory-logo">
    <span class="gear">⚙</span>
    <div>
      <h1>VOOMBA FACTORY</h1>
      <span>PROJECT STATUS BOARD</span>
    </div>
  </div>
  <div class="header-stats" id="header-stats">
    <div class="stat"><span class="stat-value green" id="stat-done">0</span><span class="stat-label">完成</span></div>
    <div class="stat"><span class="stat-value orange" id="stat-wip">0</span><span class="stat-label">进行中</span></div>
    <div class="stat"><span class="stat-value red" id="stat-todo">0</span><span class="stat-label">待开发</span></div>
  </div>
</header>

<div class="layout">
  <main id="main-content">
    <div style="text-align:center;padding:4rem;font-family:var(--mono);color:var(--muted);letter-spacing:2px">⚙ 正在拉取生产数据...</div>
  </main>
  <aside class="changelog-panel">
    <div class="changelog-header">📡 变更日志</div>
    <div class="changelog-body" id="change-log">
      <div class="log-empty">等待变更...</div>
    </div>
  </aside>
</div>

<footer class="factory-footer">
  <div><span class="status-dot"></span><span id="sync-status">正在连接...</span></div>
  <div class="ticker"><span class="ticker-inner" id="ticker-text">⚙ VOOMBA FACTORY ONLINE</span></div>
  <div style="display:flex;gap:1.5rem;align-items:center">
    <span id="last-updated" style="color:var(--muted)"></span>
    <span id="footer-time" style="font-family:var(--mono);font-size:0.65rem;color:var(--muted)"></span>
  </div>
</footer>
<script>
const ROADMAP_URL = 'https://raw.githubusercontent.com/kundouzhishou/voomba/main/roadmap.md';
const POLL_INTERVAL = 30000;

// ── 状态 ──
let prevSnapshot = null;
let changeLog = [];
let isFirstLoad = true;

// ── 模块图标 ──
const MODULE_ICONS = {
  'auth': '🔐', '认证': '🔐', '行程': '🛵', '后端': '⚡',
  'api': '⚡', '联调': '🔗', '司机': '🏍', 'sms': '📱',
  '通知': '📱', '历史': '📋', '资料': '👤', '阶段': '🔧',
};
function getIcon(name) {
  const lower = name.toLowerCase();
  for (const [k, v] of Object.entries(MODULE_ICONS)) {
    if (lower.includes(k)) return v;
  }
  return '📦';
}

// ── 解析维度值 ──
function parseDim(str) {
  if (!str) return null;
  if (str.includes('✅')) return true;
  if (str.includes('❌')) return false;
  return null;
}

// ── 解析任务行 ──
function parseTask(line) {
  const m = line.match(/^-\s*\[[ xX]\]\s*(.+)/);
  if (!m) return null;
  const rest = m[1];
  const devM  = rest.match(/\[dev:\s*([^\]]+)\]/);
  const uiM   = rest.match(/\[ui:\s*([^\]]+)\]/);
  const testM = rest.match(/\[test:\s*([^\]]+)\]/);
  const name  = rest.replace(/\[(?:dev|ui|test):[^\]]*\]/g, '').trim();
  if (!name) return null;
  return { name, dev: parseDim(devM?.[1]), ui: parseDim(uiM?.[1]), test: parseDim(testM?.[1]) };
}

// ── 解析 roadmap.md ──
function parseRoadmap(md) {
  const lines = md.split('\n');
  const modules = [];
  let cur = null;
  for (const line of lines) {
    const h2 = line.match(/^##\s+(.+)/);
    if (h2) {
      if (cur && cur.tasks.length) modules.push(cur);
      cur = { name: h2[1].trim(), icon: getIcon(h2[1]), tasks: [] };
      continue;
    }
    if (cur) {
      const t = parseTask(line);
      if (t) cur.tasks.push(t);
    }
  }
  if (cur && cur.tasks.length) modules.push(cur);
  return modules;
}

// ── 快照 ──
function buildSnapshot(modules) {
  const snap = {};
  for (const mod of modules)
    for (const task of mod.tasks)
      snap[mod.name + '::' + task.name] = { dev: task.dev, ui: task.ui, test: task.test };
  return snap;
}

// ── 对比变更 ──
function diffSnapshot(modules, old) {
  const changes = [];
  for (const mod of modules) {
    for (const task of mod.tasks) {
      const key = mod.name + '::' + task.name;
      const prev = old[key];
      if (!prev) continue;
      for (const dim of ['dev', 'ui', 'test']) {
        if (prev[dim] !== task[dim] && task[dim] !== null) {
          changes.push({ module: mod.name, task: task.name, dim, to: task[dim], time: new Date() });
        }
      }
    }
  }
  return changes;
}

// ── 渲染 ──
function isDone(t) {
  const dims = [t.dev, t.ui, t.test].filter(v => v !== null);
  return dims.length > 0 && dims.every(v => v === true);
}

function renderLight(label, val) {
  const cls = val === true ? 'on-green' : val === false ? 'on-red' : 'na';
  return `<span class="light"><span class="light-dot ${cls}"></span>${label}</span>`;
}

function renderCard(task, idx, changedKeys) {
  const done = isDone(task);
  const changed = changedKeys.has(task._key);
  return `<div class="task-card ${done ? 'done' : ''} ${changed ? 'just-changed' : ''}" style="animation-delay:${idx*0.05}s">
    <div class="task-name">${task.name}</div>
    <div class="task-lights">${renderLight('DEV',task.dev)}${renderLight('UI',task.ui)}${renderLight('TEST',task.test)}</div>
  </div>`;
}

function renderModule(mod, idx, changedKeys) {
  const done = mod.tasks.filter(isDone).length;
  const total = mod.tasks.length;
  const pct = Math.round(done / total * 100);
  const cards = mod.tasks.map((t, i) => {
    t._key = mod.name + '::' + t.name;
    return renderCard(t, i, changedKeys);
  }).join('');
  return `<div class="module-section" id="mod-${idx}">
    <div class="module-header" onclick="toggleModule(${idx})">
      <div class="module-title"><span class="module-icon">${mod.icon}</span><span class="module-name">${mod.name}</span></div>
      <div class="module-progress">
        <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
        <span class="progress-pct">${done}/${total}</span>
        <span class="collapse-icon">▼</span>
      </div>
    </div>
    <div class="conveyor-track"><div class="tasks-grid">${cards}</div></div>
    <div class="belt-decoration"></div>
  </div>`;
}

function toggleModule(idx) {
  document.getElementById('mod-' + idx).classList.toggle('collapsed');
}

function renderAll(modules, changedKeys) {
  const main = document.getElementById('main-content');
  const collapsed = new Set([...document.querySelectorAll('.module-section.collapsed')].map(e => e.id));
  main.innerHTML = modules.map((m, i) => renderModule(m, i, changedKeys)).join('');
  collapsed.forEach(id => { const el = document.getElementById(id); if (el) el.classList.add('collapsed'); });

  let done = 0, wip = 0, todo = 0;
  modules.forEach(mod => mod.tasks.forEach(t => {
    if (isDone(t)) { done++; return; }
    const anyDone = [t.dev, t.ui, t.test].filter(v => v !== null).some(v => v === true);
    if (anyDone) wip++; else todo++;
  }));
  document.getElementById('stat-done').textContent = done;
  document.getElementById('stat-wip').textContent = wip;
  document.getElementById('stat-todo').textContent = todo;
  const total = done + wip + todo;
  document.getElementById('ticker-text').textContent =
    `⚙ 总任务 ${total} 项 · 已完成 ${done} 项 · 进行中 ${wip} 项 · 待开发 ${todo} 项 · 整体进度 ${Math.round(done/total*100)}% · VOOMBA FACTORY ONLINE ·`;

  // 4秒后移除高亮
  if (changedKeys.size > 0) {
    setTimeout(() => document.querySelectorAll('.just-changed').forEach(el => el.classList.remove('just-changed')), 4000);
  }
}

// ── 变更日志 ──
function timeAgo(d) {
  const s = Math.floor((Date.now() - d) / 1000);
  if (s < 60) return '刚刚';
  if (s < 3600) return Math.floor(s/60) + '分钟前';
  return Math.floor(s/3600) + '小时前';
}

function renderChangeLog() {
  const el = document.getElementById('change-log');
  if (!el) return;
  if (!changeLog.length) {
    el.innerHTML = '<div class="log-empty">等待变更...</div>';
    return;
  }
  el.innerHTML = changeLog.map(c => {
    const icon = c.to ? '✅' : '❌';
    const dimLabel = { dev: 'DEV', ui: 'UI', test: 'TEST' }[c.dim];
    return `<div class="log-entry">
      <span class="log-task">${icon} ${c.task}</span>
      <div class="log-meta">
        <span class="log-dim">${dimLabel}</span>
        <span class="${c.to ? 'log-status-ok' : 'log-status-fail'}">${c.to ? '完成' : '回退'}</span>
        <span class="log-time">${timeAgo(c.time)}</span>
      </div>
    </div>`;
  }).join('');
}

// ── 拉取 & 更新 ──
let lastContent = '';
async function fetchRoadmap() {
  try {
    const res = await fetch(ROADMAP_URL + '?t=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const text = await res.text();
    if (text === lastContent) { setStatus(true, '已同步，无变化'); return; }
    lastContent = text;
    const modules = parseRoadmap(text);
    if (!modules.length) return;

    if (isFirstLoad) {
      prevSnapshot = buildSnapshot(modules);
      renderAll(modules, new Set());
      isFirstLoad = false;
      setStatus(true, '已连接');
    } else {
      const changes = diffSnapshot(modules, prevSnapshot);
      prevSnapshot = buildSnapshot(modules);
      const changedKeys = new Set(changes.map(c => c.module + '::' + c.task));
      renderAll(modules, changedKeys);
      if (changes.length) {
        changeLog = [...changes, ...changeLog].slice(0, 30);
        renderChangeLog();
        setStatus(true, `检测到 ${changes.length} 项变更`);
      } else {
        setStatus(true, '已同步');
      }
    }
    document.getElementById('last-updated').textContent =
      '更新于 ' + new Date().toISOString().replace('T',' ').slice(0,19) + ' UTC';
  } catch (e) {
    setStatus(false, '同步失败: ' + e.message);
  }
}

function setStatus(ok, msg) {
  const dot = document.querySelector('.status-dot');
  dot.style.background = ok ? 'var(--green)' : 'var(--red)';
  dot.style.boxShadow = ok ? '0 0 6px var(--green)' : '0 0 6px var(--red)';
  document.getElementById('sync-status').textContent = msg;
}

// ── 启动 ──
function init() {
  function tick() {
    document.getElementById('footer-time').textContent =
      new Date().toISOString().replace('T',' ').slice(0,19) + ' UTC';
    renderChangeLog(); // 更新时间显示
  }
  tick();
  setInterval(tick, 1000);
  fetchRoadmap();
  setInterval(fetchRoadmap, POLL_INTERVAL);
}
init();
</script>
</body>
</html>

const ROADMAP_URL = 'https://raw.githubusercontent.com/kundouzhishou/voomba/main/roadmap.md';
const POLL_INTERVAL = 30000;

// ── 状态 ──
let prevSnapshot = null;
let changeLog = [];
let isFirstLoad = true;

// ── 解析 roadmap.md ──
const MODULE_ICONS = {
  'auth':'🔐','认证':'🔐','行程':'🛵','ride':'🛵',
  '后端':'⚡','api':'⚡','联调':'🔗','司机':'🏍',
  'sms':'📱','通知':'📱','历史':'📋','资料':'👤','阶段':'🔧',
};
function getIcon(name) {
  const l = name.toLowerCase();
  for (const [k,v] of Object.entries(MODULE_ICONS)) if (l.includes(k)) return v;
  return '📦';
}
function parseDim(s) {
  if (!s) return null;
  if (s.includes('✅')) return true;
  if (s.includes('❌')) return false;
  return null;
}
function parseRoadmap(md) {
  const modules = []; let cur = null;
  for (const line of md.split('\n')) {
    const h2 = line.match(/^##\s+(.+)/);
    if (h2) {
      if (cur && cur.tasks.length) modules.push(cur);
      cur = { name: h2[1].trim(), icon: getIcon(h2[1]), tasks: [] };
      continue;
    }
    if (cur && line.match(/^-\s*\[[ xX]\]/)) {
      const rest = line.replace(/^-\s*\[[ xX]\]\s*/, '');
      const dev  = rest.match(/\[dev:\s*([^\]]+)\]/);
      const ui   = rest.match(/\[ui:\s*([^\]]+)\]/);
      const test = rest.match(/\[test:\s*([^\]]+)\]/);
      const name = rest.replace(/\[(?:dev|ui|test):[^\]]*\]/g,'').trim();
      if (name) cur.tasks.push({ name, dev: parseDim(dev?.[1]), ui: parseDim(ui?.[1]), test: parseDim(test?.[1]) });
    }
  }
  if (cur && cur.tasks.length) modules.push(cur);
  return modules;
}

// ── 快照 & diff ──
function buildSnapshot(modules) {
  const s = {};
  for (const m of modules)
    for (const t of m.tasks)
      s[m.name+'::'+t.name] = { dev: t.dev, ui: t.ui, test: t.test };
  return s;
}
function diffSnapshot(modules, prev) {
  const changes = [];
  for (const m of modules)
    for (const t of m.tasks) {
      const key = m.name+'::'+t.name;
      const old = prev[key];
      if (!old) continue;
      for (const dim of ['dev','ui','test']) {
        if (old[dim] !== t[dim] && t[dim] !== null)
          changes.push({ module: m.name, task: t.name, dim, from: old[dim], to: t[dim], time: new Date() });
      }
    }
  return changes;
}

// ── 渲染 ──
function isDone(t) {
  const d = [t.dev,t.ui,t.test].filter(v=>v!==null);
  return d.length>0 && d.every(v=>v===true);
}
function renderLight(label, val) {
  const cls = val===true?'on-green':val===false?'on-red':'na';
  return `<span class="light"><span class="light-dot ${cls}"></span>${label}</span>`;
}
function renderCard(task, idx, changed) {
  const done = isDone(task);
  const cls = changed ? 'just-changed' : done ? 'done' : '';
  return `<div class="task-card ${cls}" style="animation-delay:${idx*0.04}s">
    <div class="task-name">${task.name}</div>
    <div class="task-lights">
      ${renderLight('DEV',task.dev)}${renderLight('UI',task.ui)}${renderLight('TEST',task.test)}
    </div>
  </div>`;
}
function renderModule(mod, idx, changedKeys) {
  const done = mod.tasks.filter(isDone).length;
  const pct  = Math.round(done/mod.tasks.length*100);
  const cards = mod.tasks.map((t,i)=>renderCard(t,i,changedKeys.has(mod.name+'::'+t.name))).join('');
  return `<div class="module-section" id="mod-${idx}">
    <div class="module-header" onclick="toggleModule(${idx})">
      <div class="module-title">
        <span class="module-icon">${mod.icon}</span>
        <span class="module-name">${mod.name}</span>
      </div>
      <div class="module-progress">
        <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
        <span class="progress-pct">${done}/${mod.tasks.length}</span>
        <span class="collapse-icon">▼</span>
      </div>
    </div>
    <div class="conveyor-track"><div class="tasks-grid">${cards}</div></div>
    <div class="belt-decoration"></div>
  </div>`;
}
function toggleModule(idx) { document.getElementById('mod-'+idx).classList.toggle('collapsed'); }

function renderAll(modules, changes) {
  const changedKeys = new Set(changes.map(c=>c.module+'::'+c.task));
  const collapsed = new Set([...document.querySelectorAll('.module-section.collapsed')].map(e=>e.id));
  document.getElementById('main-content').innerHTML = modules.map((m,i)=>renderModule(m,i,changedKeys)).join('');
  collapsed.forEach(id=>{ const el=document.getElementById(id); if(el) el.classList.add('collapsed'); });

  let done=0,wip=0,todo=0;
  modules.forEach(m=>m.tasks.forEach(t=>{
    if(isDone(t)){done++;return;}
    const any=[t.dev,t.ui,t.test].filter(v=>v!==null).some(v=>v===true);
    any?wip++:todo++;
  }));
  document.getElementById('stat-done').textContent=done;
  document.getElementById('stat-wip').textContent=wip;
  document.getElementById('stat-todo').textContent=todo;
  const total=done+wip+todo;
  document.getElementById('ticker-text').textContent=
    `⚙ 总任务 ${total} 项 · 已完成 ${done} 项 · 进行中 ${wip} 项 · 待开发 ${todo} 项 · 整体进度 ${Math.round(done/total*100)}% · VOOMBA FACTORY ONLINE ·`;

  // 4秒后移除高亮
  if (changes.length) setTimeout(()=>document.querySelectorAll('.just-changed').forEach(el=>el.classList.remove('just-changed')), 4000);
}

// ── 变更日志 ──
function timeAgo(d) {
  const s=Math.floor((Date.now()-d)/1000);
  if(s<60) return '刚刚';
  if(s<3600) return Math.floor(s/60)+'分钟前';
  return Math.floor(s/3600)+'小时前';
}
function renderChangeLog() {
  const el = document.getElementById('change-log');
  if (!changeLog.length) { el.innerHTML='<div class="log-empty">等待变更...</div>'; return; }
  el.innerHTML = changeLog.map(c=>`
    <div class="log-entry">
      <div class="log-entry-top">
        <span class="log-icon">${c.to===true?'✅':'❌'}</span>
        <span class="log-task">${c.task}</span>
      </div>
      <div class="log-meta">
        <span class="log-dim">${c.dim.toUpperCase()}</span>
        <span class="log-time">${timeAgo(c.time)}</span>
      </div>
    </div>`).join('');
}

// ── 状态指示 ──
function setStatus(ok, msg) {
  const dot = document.getElementById('status-dot');
  dot.style.background = ok ? 'var(--green)' : 'var(--red)';
  dot.style.boxShadow  = ok ? '0 0 6px var(--green)' : '0 0 6px var(--red)';
  document.getElementById('sync-status').textContent = msg;
}

// ── 拉取 & 更新 ──
let lastContent = '';
async function fetchRoadmap() {
  try {
    const res = await fetch(ROADMAP_URL + '?t=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const text = await res.text();
    if (text === lastContent) { setStatus(true, '已同步，无变化'); return; }
    lastContent = text;
    const modules = parseRoadmap(text);
    if (!modules.length) return;

    if (isFirstLoad) {
      renderAll(modules, []);
      prevSnapshot = buildSnapshot(modules);
      isFirstLoad = false;
      setStatus(true, '数据已加载');
      document.getElementById('last-updated').textContent = '上次更新 ' + new Date().toISOString().slice(0,19).replace('T',' ') + ' UTC';
    } else {
      const changes = diffSnapshot(modules, prevSnapshot);
      prevSnapshot = buildSnapshot(modules);
      renderAll(modules, changes);
      if (changes.length) {
        changeLog = [...changes, ...changeLog].slice(0, 30);
        renderChangeLog();
        setStatus(true, `检测到 ${changes.length} 项变更`);
      } else {
        setStatus(true, '已同步，无变化');
      }
      document.getElementById('last-updated').textContent = '上次更新 ' + new Date().toISOString().slice(0,19).replace('T',' ') + ' UTC';
    }
  } catch(e) {
    setStatus(false, '同步失败: ' + e.message);
  }
}

// ── 时钟 ──
function tick() {
  document.getElementById('footer-time').textContent =
    new Date().toISOString().slice(0,19).replace('T',' ') + ' UTC';
  renderChangeLog(); // 更新"X分钟前"
}

// ── 启动 ──
tick();
setInterval(tick, 1000);
fetchRoadmap();
setInterval(fetchRoadmap, POLL_INTERVAL);
</script>
