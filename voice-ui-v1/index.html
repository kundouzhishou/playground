<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>小金语音</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #ffffff;
    --btn-bg: #f0f0f0;
    --btn-size: 60px;
    --sphere-size: min(58vw, 52vh);
    --text-primary: #111;
    --text-secondary: #888;
    --blue-glow: rgba(30, 140, 255, 0.38);
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
  }

  /* ── 状态栏占位 ── */
  .statusbar { height: 44px; width: 100%; flex-shrink: 0; }

  /* ── 顶部右上角：仅 CC ── */
  .topbar {
    position: absolute;
    top: 54px; right: 20px;
    display: flex; gap: 14px;
    z-index: 20;
  }
  .topbar-btn {
    width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    color: #aaa;
    cursor: pointer;
    border-radius: 50%;
    transition: color 0.2s, background 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .topbar-btn:hover { color: #555; background: #f0f0f0; }
  .topbar-btn.active { color: #1a8fe8; }
  .topbar-btn svg {
    width: 26px; height: 26px;
    stroke: currentColor; fill: none;
    stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round;
  }

  /* ── 主内容区 ── */
  .stage {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
    position: relative;
    padding-bottom: 10px;
  }

  /* ── 球容器 ── */
  .sphere-wrap {
    position: relative;
    width: var(--sphere-size);
    height: var(--sphere-size);
    cursor: pointer;
    flex-shrink: 0;
    z-index: 5;
    /* AI回复时移到左上 */
    transition:
      width  0.65s cubic-bezier(.4,0,.2,1),
      height 0.65s cubic-bezier(.4,0,.2,1),
      top    0.65s cubic-bezier(.4,0,.2,1),
      left   0.65s cubic-bezier(.4,0,.2,1),
      position 0s;
  }
  .stage.ai-reply .sphere-wrap {
    position: absolute;
    top: 0; left: 18px;
    width: 68px; height: 68px;
  }

  /* ── 球本体 ── */
  .sphere {
    width: 100%; height: 100%;
    border-radius: 50%;
    position: relative;
    overflow: hidden;
    transition: box-shadow 1s ease;
  }

  /* 黑色核心层（未连接） */
  .sphere::before {
    content: '';
    position: absolute; inset: 0;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 30%,
      #666 0%, #222 40%, #0a0a0a 100%);
    opacity: 1;
    transition: opacity 1.6s ease;
  }

  /* ChatGPT 蓝白渐变层 */
  .sphere::after {
    content: '';
    position: absolute; inset: 0;
    border-radius: 50%;
    background:
      radial-gradient(circle at 30% 25%,
        #f0f9ff 0%,
        #7dd4fc 12%,
        #38bdf8 28%,
        #0ea5e9 48%,
        #0369a1 72%,
        #023f6b 100%);
    opacity: 0;
    transition: opacity 1.6s ease;
  }

  /* 顶部高光 */
  .sphere-gloss {
    position: absolute; inset: 0;
    border-radius: 50%;
    background:
      radial-gradient(ellipse 58% 36% at 33% 20%,
        rgba(255,255,255,0.60) 0%,
        transparent 68%),
      radial-gradient(ellipse 28% 18% at 72% 78%,
        rgba(255,255,255,0.14) 0%,
        transparent 70%);
    pointer-events: none;
    z-index: 4;
  }

  /* 液体流动层（用户说话时可见） */
  .sphere-liquid {
    position: absolute; inset: -18%;
    border-radius: 50%;
    background:
      radial-gradient(ellipse 75% 38% at 50% 50%,
        rgba(125, 212, 252, 0.4) 0%,
        transparent 68%),
      radial-gradient(ellipse 45% 75% at 72% 28%,
        rgba(186, 230, 253, 0.28) 0%,
        transparent 60%);
    opacity: 0;
    z-index: 2;
    transition: opacity 0.5s ease;
    animation: liquid-flow 2.8s ease-in-out infinite;
    will-change: transform;
  }
  @keyframes liquid-flow {
    0%   { transform: translate(0,0)    rotate(0deg)  scale(1); }
    25%  { transform: translate(5%,-4%) rotate(18deg) scale(1.05); }
    50%  { transform: translate(-4%,5%) rotate(-12deg)scale(0.96); }
    75%  { transform: translate(6%,3%)  rotate(22deg) scale(1.04); }
    100% { transform: translate(0,0)    rotate(0deg)  scale(1); }
  }

  /* ── 球动画 ── */

  /* 未连接：慢呼吸 */
  @keyframes breathe-slow {
    0%,100% { transform: scale(0.96); }
    50%      { transform: scale(1.04); }
  }
  /* 连接中：稍快呼吸 */
  @keyframes breathe-mid {
    0%,100% { transform: scale(0.94); }
    50%      { transform: scale(1.06); }
  }
  /* 待机：轻柔上下浮动 */
  @keyframes float {
    0%,100% { transform: translateY(0px) scale(1); }
    50%      { transform: translateY(-6px) scale(1.01); }
  }
  /* 用户说话：快速呼吸 */
  @keyframes user-breathe {
    0%,100% { transform: scale(1); }
    50%      { transform: scale(1.07); }
  }
  /* 思考：收缩 + 轻微摇摆 */
  @keyframes think {
    0%   { transform: scale(0.90) rotate(0deg); }
    20%  { transform: scale(0.88) rotate(-3deg); }
    50%  { transform: scale(0.92) rotate(3deg); }
    80%  { transform: scale(0.89) rotate(-2deg); }
    100% { transform: scale(0.90) rotate(0deg); }
  }
  /* AI 说话：节奏扩张 */
  @keyframes speak-pulse {
    0%   { transform: scale(1.00); }
    18%  { transform: scale(1.08); }
    36%  { transform: scale(1.03); }
    55%  { transform: scale(1.10); }
    75%  { transform: scale(1.04); }
    100% { transform: scale(1.00); }
  }

  .sphere.anim-breathe-slow { animation: breathe-slow 3.5s ease-in-out infinite; }
  .sphere.anim-breathe-mid  { animation: breathe-mid  2.2s ease-in-out infinite; }
  .sphere.anim-float        { animation: float        4.2s ease-in-out infinite; }
  .sphere.anim-user         { animation: user-breathe 0.95s ease-in-out infinite; }
  .sphere.anim-think        { animation: think        2.0s ease-in-out infinite; }
  .sphere.anim-speak        { animation: speak-pulse  1.1s ease-in-out infinite; }

  /* 连接状态：蓝色辉光阴影 */
  .sphere.connected {
    box-shadow:
      0  0  0   1px rgba(14, 165, 233, 0.15),
      0  8px 36px rgba(14, 165, 233, 0.40),
      0  2px 10px rgba(3,  105, 161, 0.25);
  }
  /* 思考：收缩阴影减弱 */
  .sphere.anim-think.connected {
    box-shadow:
      0  0  0   1px rgba(14, 165, 233, 0.10),
      0  4px 20px rgba(14, 165, 233, 0.25);
  }
  /* AI 说话：阴影随节奏强化 */
  .sphere.anim-speak.connected {
    box-shadow:
      0  0  0   2px rgba(14, 165, 233, 0.20),
      0  10px 50px rgba(14, 165, 233, 0.55),
      0  2px 14px rgba(3,  105, 161, 0.30);
  }

  /* 波纹（AI 说话时出现） */
  .sphere-ripple {
    position: absolute; inset: -12%;
    border-radius: 50%;
    border: 1.5px solid rgba(14, 165, 233, 0.0);
    pointer-events: none;
    z-index: 0;
  }
  .sphere.anim-speak + .sphere-gloss ~ .sphere-ripple,
  .sphere-ripple.active {
    animation: ripple-out 2.2s ease-out infinite;
  }
  @keyframes ripple-out {
    0%   { inset: -4%;  border-color: rgba(14,165,233,0.45); }
    100% { inset: -28%; border-color: rgba(14,165,233,0.00); }
  }

  /* ── 状态文字 ── */
  .status-label {
    margin-top: 30px;
    font-size: 15px;
    color: var(--text-secondary);
    letter-spacing: 0.4px;
    opacity: 1;
    transition: opacity 0.4s;
    min-height: 20px;
  }
  .stage.ai-reply .status-label { opacity: 0; pointer-events: none; }

  /* ── CC 字幕 / AI 回复文字 ── */
  .reply-text {
    position: absolute;
    top: 86px;
    left: 22px; right: 22px;
    font-size: 25px;
    font-weight: 400;
    color: var(--text-primary);
    line-height: 1.5;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.5s ease 0.15s;
    z-index: 4;
  }
  .stage.ai-reply .reply-text { opacity: 1; pointer-events: auto; }

  /* CC 隐藏时字幕区不显示 */
  .cc-off .reply-text { display: none; }

  /* ── 底部工具栏：3 个按钮居中排列 ── */
  .toolbar {
    width: 100%;
    padding: 18px 0 36px;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 32px;
    flex-shrink: 0;
    position: relative;
    z-index: 10;
  }

  .btn {
    width: var(--btn-size);
    height: var(--btn-size);
    border-radius: 50%;
    background: var(--btn-bg);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.25s, transform 0.15s, box-shadow 0.25s;
  }
  .btn:active { transform: scale(0.91); }
  .btn svg {
    width: 24px; height: 24px;
    stroke: #444; fill: none;
    stroke-width: 1.9; stroke-linecap: round; stroke-linejoin: round;
    transition: stroke 0.25s;
  }

  /* 麦克风：激活（说话中）*/
  .btn.mic-active {
    background: #e8f4ff;
    box-shadow: 0 0 0 3px rgba(14,165,233,0.25);
  }
  .btn.mic-active svg { stroke: #0ea5e9; }

  /* 麦克风：静音 */
  .btn.mic-muted {
    background: #fff0f2;
    box-shadow: 0 0 0 3px rgba(220,38,38,0.18);
  }
  .btn.mic-muted svg { stroke: #dc2626; }

  /* 关闭按钮 */
  .btn.btn-close svg { stroke: #888; }

  /* 拍照/上传 */
  .btn.camera-active {
    background: #f0f9ff;
    box-shadow: 0 0 0 3px rgba(14,165,233,0.20);
  }
  .btn.camera-active svg { stroke: #0ea5e9; }

  /* ── 上传面板弹出 ── */
  .upload-panel {
    position: absolute;
    bottom: 100px;
    left: 50%; transform: translateX(-50%) translateY(14px);
    width: calc(100% - 44px);
    max-width: 360px;
    background: #f5f5f7;
    border-radius: 18px;
    overflow: hidden;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.32s ease, transform 0.32s cubic-bezier(.4,0,.2,1);
    z-index: 30;
    box-shadow: 0 8px 32px rgba(0,0,0,0.12);
  }
  .upload-panel.visible {
    opacity: 1;
    pointer-events: auto;
    transform: translateX(-50%) translateY(0);
  }
  .upload-option {
    padding: 16px 22px;
    font-size: 16px;
    color: #222;
    cursor: pointer;
    display: flex; align-items: center; gap: 14px;
    border-bottom: 1px solid rgba(0,0,0,0.07);
    transition: background 0.18s;
    -webkit-tap-highlight-color: transparent;
  }
  .upload-option:last-child { border-bottom: none; }
  .upload-option:active { background: rgba(0,0,0,0.06); }
  .upload-option svg {
    width: 22px; height: 22px;
    stroke: #555; fill: none;
    stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round;
    flex-shrink: 0;
  }

  /* ── 吐司提示 ── */
  .toast {
    position: fixed;
    top: 14px; left: 50%; transform: translateX(-50%) translateY(-10px);
    background: rgba(20,20,20,0.80);
    color: #fff;
    font-size: 13px; padding: 6px 16px;
    border-radius: 20px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.28s, transform 0.28s;
    z-index: 100;
    white-space: nowrap;
    backdrop-filter: blur(8px);
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
</style>
</head>
<body>

<div class="statusbar"></div>

<!-- 右上角：仅 CC 字幕开关 -->
<div class="topbar">
  <div class="topbar-btn" id="btnCC" title="字幕开关">
    <!-- 线稿 CC 图标 -->
    <svg viewBox="0 0 24 24">
      <rect x="2" y="5" width="20" height="14" rx="3"/>
      <path d="M8 12.5a2.5 2.5 0 100-5 2.5 2.5 0 000 5z" stroke="none" fill="currentColor" opacity="0"/>
      <text x="5.5" y="15.5" font-size="7.5" font-weight="700"
            fill="currentColor" stroke="none"
            font-family="-apple-system,BlinkMacSystemFont,sans-serif"
            letter-spacing="0.3">CC</text>
    </svg>
  </div>
</div>

<!-- 主舞台 -->
<div class="stage" id="stage">
  <div class="sphere-wrap" id="sphereWrap">
    <!-- 波纹（在球元素外，绝对定位） -->
    <div class="sphere-ripple" id="sphereRipple"></div>
    <div class="sphere anim-breathe-slow" id="sphere">
      <div class="sphere-liquid" id="sphereLiquid"></div>
      <div class="sphere-gloss"></div>
    </div>
  </div>

  <div class="status-label" id="statusLabel">正在连接…</div>
  <div class="reply-text"   id="replyText"></div>
</div>

<!-- 底部工具栏：拍照/上传 · 麦克风 · 关闭 -->
<div class="toolbar">

  <!-- 拍照/上传 -->
  <div class="btn" id="btnCamera" title="拍照或上传">
    <svg viewBox="0 0 24 24">
      <path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/>
      <circle cx="12" cy="13" r="4"/>
    </svg>
  </div>

  <!-- 麦克风 -->
  <div class="btn" id="btnMic" title="麦克风">
    <svg viewBox="0 0 24 24">
      <path d="M12 1a3 3 0 013 3v8a3 3 0 01-6 0V4a3 3 0 013-3z"/>
      <path d="M19 10v2a7 7 0 01-14 0v-2"/>
      <line x1="12" y1="19" x2="12" y2="23"/>
      <line x1="8"  y1="23" x2="16" y2="23"/>
    </svg>
  </div>

  <!-- 关闭 -->
  <div class="btn btn-close" id="btnClose" title="关闭">
    <svg viewBox="0 0 24 24">
      <line x1="18" y1="6"  x2="6"  y2="18"/>
      <line x1="6"  y1="6"  x2="18" y2="18"/>
    </svg>
  </div>

  <!-- 上传面板 -->
  <div class="upload-panel" id="uploadPanel">
    <div class="upload-option" id="optUpload">
      <svg viewBox="0 0 24 24">
        <rect x="3" y="3" width="18" height="18" rx="3"/>
        <circle cx="8.5" cy="8.5" r="1.5"/>
        <polyline points="21 15 16 10 5 21"/>
      </svg>
      上传照片
    </div>
    <div class="upload-option" id="optCamera">
      <svg viewBox="0 0 24 24">
        <path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/>
        <circle cx="12" cy="13" r="4"/>
      </svg>
      拍照
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════
//  状态机
// ══════════════════════════════════════════
const S = {
  DISCONNECTED : 'disconnected',  // 黑球慢呼吸
  CONNECTING   : 'connecting',    // 黑→蓝渐变过渡
  IDLE         : 'idle',          // 蓝球浮动，聆听中
  USER_TALKING : 'user-talking',  // 用户说话：快速呼吸+液体
  AI_THINKING  : 'ai-thinking',   // AI 思考：收缩摇摆
  AI_TALKING   : 'ai-talking',    // AI 说话：节奏扩张+波纹
};

// DOM
const stage        = document.getElementById('stage');
const sphere       = document.getElementById('sphere');
const sphereLiquid = document.getElementById('sphereLiquid');
const sphereRipple = document.getElementById('sphereRipple');
const sphereWrap   = document.getElementById('sphereWrap');
const statusLabel  = document.getElementById('statusLabel');
const replyText    = document.getElementById('replyText');
const btnCC        = document.getElementById('btnCC');
const btnCamera    = document.getElementById('btnCamera');
const btnMic       = document.getElementById('btnMic');
const btnClose     = document.getElementById('btnClose');
const uploadPanel  = document.getElementById('uploadPanel');
const optUpload    = document.getElementById('optUpload');
const optCamera    = document.getElementById('optCamera');
const toastEl      = document.getElementById('toast');

let state    = S.DISCONNECTED;
let ccOn     = true;
let micMuted = false;
let autoTimer = null;
let typeTimer = null;

const ANIM_CLASSES = [
  'anim-breathe-slow','anim-breathe-mid',
  'anim-float','anim-user','anim-think','anim-speak'
];

// 示例回复
const REPLIES = [
  '今天北京天气晴朗，气温 12°C，非常适合外出散步。',
  '我已帮你把会议调整到下午三点，需要我发送提醒吗？',
  '根据你的喜好，推荐周杰伦的《晴天》，经典之作。',
  '这是个很深刻的问题，意识的本质至今仍是哲学与科学最大的谜题之一。',
];
let replyIdx = 0;

// ── 工具函数 ──

function toast(msg, ms = 1800) {
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  clearTimeout(toastEl._t);
  toastEl._t = setTimeout(() => toastEl.classList.remove('show'), ms);
}

function clearAnims() {
  ANIM_CLASSES.forEach(c => sphere.classList.remove(c));
}

// 注入样式控制 ::before / ::after 的 opacity（CSS 伪元素无法直接 JS 操控）
const pseudoStyle = document.createElement('style');
pseudoStyle.id = 'pseudo-style';
document.head.appendChild(pseudoStyle);

function setConnected(on) {
  if (on) {
    pseudoStyle.textContent =
      '.sphere::before{opacity:0!important}.sphere::after{opacity:1!important}';
    sphere.classList.add('connected');
  } else {
    pseudoStyle.textContent =
      '.sphere::before{opacity:1!important}.sphere::after{opacity:0!important}';
    sphere.classList.remove('connected');
  }
}

function setLiquid(on) { sphereLiquid.style.opacity = on ? '1' : '0'; }
function setRipple(on) { sphereRipple.classList.toggle('active', on); }

function setMicBtn(mode) {
  // mode: 'idle' | 'active' | 'muted'
  btnMic.classList.remove('mic-active','mic-muted');
  if (mode === 'active') btnMic.classList.add('mic-active');
  if (mode === 'muted')  btnMic.classList.add('mic-muted');
}

function typeText(text) {
  clearInterval(typeTimer);
  replyText.textContent = '';
  let i = 0;
  typeTimer = setInterval(() => {
    replyText.textContent += text[i++];
    if (i >= text.length) clearInterval(typeTimer);
  }, 46);
}

// ── 核心状态切换 ──

function toState(next) {
  clearTimeout(autoTimer);
  state = next;
  clearAnims();
  setLiquid(false);
  setRipple(false);
  uploadPanel.classList.remove('visible');
  btnCamera.classList.remove('camera-active');
  stage.classList.remove('ai-reply');

  switch (next) {

    case S.DISCONNECTED:
      setConnected(false);
      sphere.classList.add('anim-breathe-slow');
      statusLabel.textContent = '正在连接…';
      setMicBtn('idle');
      break;

    case S.CONNECTING:
      setConnected(true);            // 触发黑→蓝 1.6s 渐变
      sphere.classList.add('anim-breathe-mid');
      statusLabel.textContent = '连接中…';
      setMicBtn('idle');
      autoTimer = setTimeout(() => toState(S.IDLE), 1700);
      break;

    case S.IDLE:
      setConnected(true);
      sphere.classList.add('anim-float');
      statusLabel.textContent = '小金正在聆听';
      setMicBtn('idle');
      replyText.textContent = '';
      break;

    case S.USER_TALKING:
      setConnected(true);
      sphere.classList.add('anim-user');
      setLiquid(true);
      statusLabel.textContent = '请说话…';
      setMicBtn('active');
      break;

    case S.AI_THINKING:
      setConnected(true);
      sphere.classList.add('anim-think');
      statusLabel.textContent = '小金正在思考…';
      setMicBtn('idle');
      replyText.textContent = '';
      autoTimer = setTimeout(() => toState(S.AI_TALKING), 1900);
      break;

    case S.AI_TALKING:
      setConnected(true);
      sphere.classList.add('anim-speak');
      setRipple(true);
      stage.classList.add('ai-reply');
      statusLabel.textContent = '';
      setMicBtn('idle');
      typeText(REPLIES[replyIdx++ % REPLIES.length]);
      break;
  }
}

// ══════════════════════════════════════════
//  交互事件
// ══════════════════════════════════════════

// 麦克风按钮：驱动主流程
btnMic.addEventListener('click', () => {
  if (micMuted) {
    micMuted = false;
    setMicBtn('idle');
    toast('🎙️ 麦克风已开启');
    return;
  }
  const next = {
    [S.DISCONNECTED] : S.CONNECTING,
    [S.IDLE]         : S.USER_TALKING,
    [S.USER_TALKING] : S.AI_THINKING,
    [S.AI_THINKING]  : S.IDLE,
    [S.AI_TALKING]   : S.IDLE,
  }[state];
  if (next) toState(next);
});

// 长按麦克风静音
let micHoldTimer = null;
function startMicHold() {
  micHoldTimer = setTimeout(() => {
    micMuted = !micMuted;
    if (micMuted) {
      setMicBtn('muted');
      toast('🔇 已静音（再次点击解除）');
    } else {
      setMicBtn(state === S.USER_TALKING ? 'active' : 'idle');
      toast('🎙️ 已取消静音');
    }
  }, 600);
}
function cancelMicHold() { clearTimeout(micHoldTimer); }
btnMic.addEventListener('mousedown',  startMicHold);
btnMic.addEventListener('mouseup',    cancelMicHold);
btnMic.addEventListener('mouseleave', cancelMicHold);
btnMic.addEventListener('touchstart', e => { e.preventDefault(); startMicHold(); }, { passive: false });
btnMic.addEventListener('touchend',   cancelMicHold);

// 拍照/上传按钮
btnCamera.addEventListener('click', () => {
  if (state === S.AI_TALKING || state === S.AI_THINKING) {
    toast('请等待小金回答完毕');
    return;
  }
  uploadPanel.classList.toggle('visible');
  btnCamera.classList.toggle('camera-active', uploadPanel.classList.contains('visible'));
});

// 上传面板选项
optUpload.addEventListener('click', () => {
  uploadPanel.classList.remove('visible');
  btnCamera.classList.remove('camera-active');
  toast('📂 从相册选择图片…');
});
optCamera.addEventListener('click', () => {
  uploadPanel.classList.remove('visible');
  btnCamera.classList.remove('camera-active');
  toast('📷 正在打开相机…');
});

// 点击面板外关闭
document.addEventListener('click', e => {
  if (!uploadPanel.contains(e.target) && e.target !== btnCamera) {
    uploadPanel.classList.remove('visible');
    btnCamera.classList.remove('camera-active');
  }
});

// CC 字幕开关
btnCC.addEventListener('click', () => {
  ccOn = !ccOn;
  btnCC.classList.toggle('active', ccOn);
  stage.classList.toggle('cc-off', !ccOn);
  toast(ccOn ? '字幕已开启' : '字幕已关闭');
});

// 关闭按钮
btnClose.addEventListener('click', () => {
  clearTimeout(autoTimer);
  clearInterval(typeTimer);
  toState(S.DISCONNECTED);
  toast('已断开连接');
  // 延迟2s后重新启动演示
  autoTimer = setTimeout(() => toState(S.CONNECTING), 2200);
});

// 点击球体快速演示
sphereWrap.addEventListener('click', () => {
  const map = {
    [S.DISCONNECTED] : S.CONNECTING,
    [S.CONNECTING]   : S.IDLE,
    [S.IDLE]         : S.USER_TALKING,
    [S.USER_TALKING] : S.AI_THINKING,
    [S.AI_THINKING]  : S.AI_TALKING,
    [S.AI_TALKING]   : S.IDLE,
  };
  if (map[state]) toState(map[state]);
});

// ══════════════════════════════════════════
//  启动
// ══════════════════════════════════════════
setConnected(false);
toState(S.DISCONNECTED);
// 自动演示：2s 后开始连接
autoTimer = setTimeout(() => toState(S.CONNECTING), 2000);
</script>
</body>
</html>
