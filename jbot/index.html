<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JBot 安装</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            padding: 2rem;
            max-width: 400px;
        }
        .icon {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 22px;
            margin: 0 auto 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
        }
        h1 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            color: #fff;
        }
        .version {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }
        .install-btn {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            text-decoration: none;
            padding: 16px 48px;
            border-radius: 14px;
            font-size: 1.2rem;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        .install-btn:active {
            transform: scale(0.96);
        }
        .note {
            margin-top: 2rem;
            color: #666;
            font-size: 0.8rem;
            line-height: 1.6;
        }
        .note p { margin-bottom: 0.3rem; }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🤖</div>
        <h1>JBot</h1>
        <div class="version">
            版本 0.4.0 (Build 1)<br>
            构建时间: 2026-02-25<br>
            后台音频模式
        </div>
        <a class="install-btn" href="itms-services://?action=download-manifest&url=https://kundouzhishou.github.io/playground/jbot/manifest.plist">
            安装 JBot
        </a>
        <div class="note">
            <p>📱 请在 iPhone 的 Safari 中打开此页面</p>
            <p>安装后前往 设置 → 通用 → VPN与设备管理 → 信任证书</p>
        </div>
    </div>
</body>
</html>
