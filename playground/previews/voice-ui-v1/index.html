<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>小金语音</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #ffffff;
    --toolbar-btn-bg: #f0f0f0;
    --toolbar-btn-size: 56px;
    --sphere-size: min(55vw, 55vh);
    --text-primary: #111;
    --text-secondary: #888;
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
  }

  /* ── 状态栏占位 ── */
  .statusbar { height: 44px; width: 100%; flex-shrink: 0; }

  /* ── 顶部图标 ── */
  .topbar {
    position: absolute;
    top: 54px; right: 20px;
    display: flex; gap: 18px;
    z-index: 20;
  }
  .topbar-icon {
    width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
    color: #c0c0c0; font-size: 18px;
    cursor: pointer; border-radius: 50%;
    transition: color 0.2s;
  }
  .topbar-icon:hover { color: #888; }
  .topbar-icon.skip {
    font-size: 15px; font-weight: 600;
    color: #aaa; letter-spacing: -0.3px;
    display: none;
  }

  /* ── 主内容区 ── */
  .stage {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
    position: relative;
    padding-bottom: 20px;
  }

  /* ── 球外壳（负责位移过渡）── */
  .sphere-wrap {
    position: relative;
    width: var(--sphere-size);
    height: var(--sphere-size);
    transition: width 0.6s cubic-bezier(.4,0,.2,1),
                height 0.6s cubic-bezier(.4,0,.2,1),
                transform 0.6s cubic-bezier(.4,0,.2,1),
                top 0.6s cubic-bezier(.4,0,.2,1);
    flex-shrink: 0;
    z-index: 5;
  }

  /* ── AI 回复时：球缩小浮到左上 ── */
  .stage.ai-reply .sphere-wrap {
    position: absolute;
    top: 0; left: 20px;
    width: 72px; height: 72px;
    transform: none;
  }

  /* ── 球本体 ── */
  .sphere {
    width: 100%; height: 100%;
    border-radius: 50%;
    position: relative;
    overflow: hidden;
    /* transition for gradient color change */
    transition: box-shadow 0.8s ease;
    /* 关键：背景用伪元素叠加，让颜色过渡丝滑 */
  }

  /* 球核心渐变层（黑色/未连接） */
  .sphere::before {
    content: '';
    position: absolute; inset: 0;
    border-radius: 50%;
    background: radial-gradient(circle at 32% 28%,
      #555 0%, #1a1a1a 45%, #000 100%);
    opacity: 1;
    transition: opacity 1.5s ease;
  }
  /* 蓝白渐变层（连接后） */
  .sphere::after {
    content: '';
    position: absolute; inset: 0;
    border-radius: 50%;
    background:
      radial-gradient(circle at 32% 28%,
        #e8f6ff 0%,
        #60bfff 18%,
        #1a8fe8 42%,
        #0060c8 70%,
        #003d8a 100%);
    opacity: 0;
    transition: opacity 1.5s ease;
  }

  /* 高光层（始终在最上） */
  .sphere-gloss {
    position: absolute; inset: 0;
    border-radius: 50%;
    background:
      radial-gradient(ellipse 60% 40% at 35% 22%,
        rgba(255,255,255,0.55) 0%,
        transparent 70%),
      radial-gradient(ellipse 30% 20% at 70% 75%,
        rgba(255,255,255,0.12) 0%,
        transparent 70%);
    pointer-events: none;
    z-index: 3;
  }

  /* 液体流动层（用户说话时才可见）*/
  .sphere-liquid {
    position: absolute; inset: -20%;
    border-radius: 50%;
    background:
      radial-gradient(ellipse 80% 40% at 50% 50%,
        rgba(100,200,255,0.35) 0%,
        transparent 70%),
      radial-gradient(ellipse 50% 80% at 70% 30%,
        rgba(150,220,255,0.25) 0%,
        transparent 60%);
    opacity: 0;
    z-index: 2;
    transition: opacity 0.5s ease;
    animation: liquid-flow 2.5s ease-in-out infinite;
    will-change: transform;
  }
  @keyframes liquid-flow {
    0%   { transform: translate(0,0) rotate(0deg) scale(1); }
    25%  { transform: translate(4%,-3%) rotate(15deg) scale(1.04); }
    50%  { transform: translate(-3%,4%) rotate(-10deg) scale(0.97); }
    75%  { transform: translate(5%,2%) rotate(20deg) scale(1.03); }
    100% { transform: translate(0,0) rotate(0deg) scale(1); }
  }

  /* ── 球动画状态 ── */

  /* 1. 未连接：慢呼吸 */
  @keyframes breathe-slow {
    0%,100% { transform: scale(0.95); }
    50%      { transform: scale(1.05); }
  }
  /* 2. 待机：上下浮动 */
  @keyframes float {
    0%,100% { transform: translateY(0px); }
    50%      { transform: translateY(-4px); }
  }
  /* 3. 思考：收缩+轻微旋转感（用 scale+skew 模拟）*/
  @keyframes think {
    0%   { transform: scale(0.92) rotate(0deg); }
    30%  { transform: scale(0.88) rotate(-2deg); }
    60%  { transform: scale(0.93) rotate(2deg); }
    100% { transform: scale(0.92) rotate(0deg); }
  }
  /* 4. AI说话：节奏扩张 */
  @keyframes speak-pulse {
    0%   { transform: scale(1); }
    20%  { transform: scale(1.07); }
    40%  { transform: scale(1.02); }
    60%  { transform: scale(1.09); }
    80%  { transform: scale(1.04); }
    100% { transform: scale(1); }
  }

  .sphere.anim-breathe { animation: breathe-slow 3s ease-in-out infinite; }
  .sphere.anim-float   { animation: float 4s ease-in-out infinite; }
  .sphere.anim-think   { animation: think 2s ease-in-out infinite; }
  .sphere.anim-speak   { animation: speak-pulse 1.2s ease-in-out infinite; }

  /* 用户说话时：液体流动层显示 + 快速呼吸 */
  @keyframes user-breathe {
    0%,100% { transform: scale(1); }
    50%      { transform: scale(1.06); }
  }
  .sphere.anim-user { animation: user-breathe 1s ease-in-out infinite; }
  .sphere.anim-user .sphere-liquid { opacity: 1; }

  /* 已连接时球的阴影 */
  .sphere.connected {
    box-shadow: 0 8px 40px rgba(0,120,255,0.35),
                0 2px 12px rgba(0,80,200,0.2);
  }

  /* ── 状态文字 ── */
  .status-label {
    margin-top: 28px;
    font-size: 14px;
    color: var(--text-secondary);
    letter-spacing: 0.5px;
    opacity: 1;
    transition: opacity 0.4s;
  }
  .stage.ai-reply .status-label { display: none; }

  /* ── AI 回复文字区 ── */
  .reply-text {
    position: absolute;
    top: 90px;
    left: 24px; right: 24px;
    font-size: 26px;
    font-weight: 400;
    color: var(--text-primary);
    line-height: 1.45;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.5s ease 0.2s;
    z-index: 4;
  }
  .stage.ai-reply .reply-text { opacity: 1; pointer-events: auto; }

  /* ── 底部工具栏 ── */
  .toolbar {
    width: 100%;
    padding: 16px 0 30px;
    display: flex;
    justify-content: space-around;
    align-items: center;
    flex-shrink: 0;
    position: relative;
    z-index: 10;
  }

  .btn {
    width: var(--toolbar-btn-size);
    height: var(--toolbar-btn-size);
    border-radius: 50%;
    background: var(--toolbar-btn-bg);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    cursor: pointer;
    user-select: none;
    transition: background 0.3s, transform 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn:active { transform: scale(0.92); }

  .btn.muted {
    background: #ffe0e5;
  }
  .btn.muted svg { color: #e0002a; }

  /* ── 上传面板（用户说话时弹出）── */
  .upload-panel {
    position: absolute;
    bottom: 90px;
    left: 50%; transform: translateX(-50%);
    width: calc(100% - 40px);
    max-width: 380px;
    background: #f5f5f7;
    border-radius: 18px;
    overflow: hidden;
    opacity: 0;
    pointer-events: none;
    transform: translateX(-50%) translateY(12px);
    transition: opacity 0.35s ease, transform 0.35s cubic-bezier(.4,0,.2,1);
    z-index: 15;
  }
  .upload-panel.visible {
    opacity: 1;
    pointer-events: auto;
    transform: translateX(-50%) translateY(0);
  }
  .upload-option {
    padding: 15px 20px;
    font-size: 17px;
    color: #333;
    cursor: pointer;
    display: flex; align-items: center; gap: 14px;
    border-bottom: 1px solid rgba(0,0,0,0.06);
    transition: background 0.2s;
  }
  .upload-option:last-child { border-bottom: none; }
  .upload-option:hover { background: rgba(0,0,0,0.04); }
  .upload-option span.icon { font-size: 22px; }

  /* ── SVG 图标 ── */
  svg { width: 24px; height: 24px; stroke: currentColor; fill: none;
        stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

  /* ── 状态切换提示（调试用，可隐藏）── */
  .dev-hint {
    position: fixed; top: 10px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.65); color: #fff;
    font-size: 12px; padding: 4px 12px; border-radius: 20px;
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s;
    z-index: 100;
  }
  .dev-hint.show { opacity: 1; }
</style>
</head>
<body>

<div class="statusbar"></div>

<!-- 顶部图标 -->
<div class="topbar">
  <div class="topbar-icon" title="字幕">
    <svg viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M7 12h4M13 12h4M7 16h2M11 16h6"/></svg>
  </div>
  <div class="topbar-icon" title="分享">
    <svg viewBox="0 0 24 24"><path d="M4 12v7a2 2 0 002 2h12a2 2 0 002-2v-7"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
  </div>
  <div class="topbar-icon" title="设置">
    <svg viewBox="0 0 24 24"><line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="20" y2="12"/><line x1="12" y1="18" x2="20" y2="18"/><circle cx="4" cy="12" r="1.5" fill="currentColor" stroke="none"/><circle cx="8" cy="18" r="1.5" fill="currentColor" stroke="none"/></svg>
  </div>
  <div class="topbar-icon skip" id="skipBtn">跳过</div>
</div>

<!-- 主舞台 -->
<div class="stage" id="stage">
  <div class="sphere-wrap" id="sphereWrap">
    <div class="sphere anim-breathe" id="sphere">
      <div class="sphere-liquid" id="sphereLiquid"></div>
      <div class="sphere-gloss"></div>
    </div>
  </div>
  <div class="status-label" id="statusLabel">正在连接…</div>
  <div class="reply-text" id="replyText"></div>
</div>

<!-- 工具栏 -->
<div class="toolbar">
  <div class="btn" id="btnCamera" title="摄像头">
    <svg viewBox="0 0 24 24"><path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
  </div>
  <div class="btn" id="btnMic" title="麦克风">
    <svg viewBox="0 0 24 24"><path d="M12 1a3 3 0 013 3v8a3 3 0 01-6 0V4a3 3 0 013-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
  </div>
  <div class="btn" id="btnMore" title="更多">
    <svg viewBox="0 0 24 24"><circle cx="5" cy="12" r="1.5" fill="#888" stroke="none"/><circle cx="12" cy="12" r="1.5" fill="#888" stroke="none"/><circle cx="19" cy="12" r="1.5" fill="#888" stroke="none"/></svg>
  </div>
  <div class="btn" id="btnClose" title="关闭">
    <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
  </div>

  <!-- 上传面板 -->
  <div class="upload-panel" id="uploadPanel">
    <div class="upload-option"><span class="icon">🖼️</span>从相册上传照片</div>
    <div class="upload-option"><span class="icon">📷</span>拍照</div>
    <div class="upload-option"><span class="icon">🖥️</span>共享屏幕</div>
  </div>
</div>

<div class="dev-hint" id="devHint"></div>

<script>
// ── 状态机 ──
const STATES = {
  DISCONNECTED: 'disconnected', // 未连接：黑球慢呼吸
  CONNECTING:   'connecting',   // 连接中：黑→蓝渐变
  IDLE:         'idle',         // 待机：蓝球浮动
  USER_TALKING: 'user-talking', // 用户说话：液体流动
  AI_THINKING:  'ai-thinking',  // AI 思考：收缩旋转
  AI_TALKING:   'ai-talking',   // AI 说话：节奏扩张
};

const sphere      = document.getElementById('sphere');
const sphereLiquid= document.getElementById('sphereLiquid');
const stage       = document.getElementById('stage');
const statusLabel = document.getElementById('statusLabel');
const replyText   = document.getElementById('replyText');
const skipBtn     = document.getElementById('skipBtn');
const btnMic      = document.getElementById('btnMic');
const btnCamera   = document.getElementById('btnCamera');
const btnClose    = document.getElementById('btnClose');
const uploadPanel = document.getElementById('uploadPanel');
const devHint     = document.getElementById('devHint');

let currentState = STATES.DISCONNECTED;
let isMuted      = false;
let aiTimer      = null;

const ANIMS = ['anim-breathe','anim-float','anim-think','anim-speak','anim-user'];

// 对话样本
const replies = [
  '今天北京天气晴朗，气温 12°C，适合外出散步。',
  '我已经帮你把会议安排到下午三点了，需要我发提醒吗？',
  '根据你的喜好，我推荐这首《晴天》，周杰伦的经典之作。',
  '这个问题很有趣。从哲学角度来看，意识的本质至今仍是最大的谜题之一。',
];
let replyIdx = 0;

function hint(msg) {
  devHint.textContent = msg;
  devHint.classList.add('show');
  clearTimeout(devHint._t);
  devHint._t = setTimeout(()=>devHint.classList.remove('show'), 1800);
}

function clearAnims() {
  ANIMS.forEach(c => sphere.classList.remove(c));
}

function setConnected(yes) {
  if (yes) {
    sphere.classList.add('connected');
    sphere.style.setProperty('--glow','1');
    // 蓝色层淡入
    sphere.style.setProperty('opacity','1');
    // 使用 CSS 类切换两个伪元素
    sphere.dataset.connected = 'true';
    updatePseudoGradient(true);
  } else {
    sphere.classList.remove('connected');
    sphere.dataset.connected = '';
    updatePseudoGradient(false);
  }
}

// 动态注入样式来切换 ::before / ::after opacity
function updatePseudoGradient(connected) {
  let el = document.getElementById('pseudo-style');
  if (!el) {
    el = document.createElement('style');
    el.id = 'pseudo-style';
    document.head.appendChild(el);
  }
  if (connected) {
    el.textContent = `.sphere::before{opacity:0!important}.sphere::after{opacity:1!important}`;
  } else {
    el.textContent = `.sphere::before{opacity:1!important}.sphere::after{opacity:0!important}`;
  }
}

function setLiquid(show) {
  sphereLiquid.style.opacity = show ? '1' : '0';
}

function toState(next) {
  clearTimeout(aiTimer);
  const prev = currentState;
  currentState = next;
  clearAnims();
  setLiquid(false);
  stage.classList.remove('ai-reply');
  skipBtn.style.display = 'none';
  uploadPanel.classList.remove('visible');

  switch(next) {
    case STATES.DISCONNECTED:
      setConnected(false);
      sphere.classList.add('anim-breathe');
      statusLabel.textContent = '正在连接…';
      hint('状态：未连接');
      break;

    case STATES.CONNECTING:
      setConnected(true); // 触发渐变过渡（1.5s）
      sphere.classList.add('anim-breathe');
      statusLabel.textContent = '连接中…';
      hint('状态：连接中');
      // 1.5s 后自动切换到 IDLE
      aiTimer = setTimeout(()=>toState(STATES.IDLE), 1600);
      break;

    case STATES.IDLE:
      setConnected(true);
      sphere.classList.add('anim-float');
      statusLabel.textContent = '小金正在聆听';
      hint('状态：待机');
      break;

    case STATES.USER_TALKING:
      setConnected(true);
      sphere.classList.add('anim-user');
      setLiquid(true);
      uploadPanel.classList.add('visible');
      statusLabel.textContent = '请说话…';
      hint('状态：用户说话');
      break;

    case STATES.AI_THINKING:
      setConnected(true);
      sphere.classList.add('anim-think');
      statusLabel.textContent = '小金正在思考…';
      hint('状态：AI 思考');
      replyText.textContent = '';
      // 1.8s 后进入 AI 说话
      aiTimer = setTimeout(()=>toState(STATES.AI_TALKING), 1800);
      break;

    case STATES.AI_TALKING:
      setConnected(true);
      sphere.classList.add('anim-speak');
      stage.classList.add('ai-reply');
      skipBtn.style.display = 'flex';
      statusLabel.textContent = '';
      hint('状态：AI 说话');
      typeText(replies[replyIdx++ % replies.length]);
      break;
  }
}

// 打字机效果
function typeText(text) {
  replyText.textContent = '';
  let i = 0;
  const timer = setInterval(()=>{
    replyText.textContent += text[i++];
    if (i >= text.length) clearInterval(timer);
  }, 48);
}

// ── 交互逻辑 ──

// 麦克风按钮：核心状态切换
btnMic.addEventListener('click', ()=>{
  if (currentState === STATES.DISCONNECTED) {
    toState(STATES.CONNECTING);
    return;
  }
  if (currentState === STATES.IDLE) {
    toState(STATES.USER_TALKING);
    return;
  }
  if (currentState === STATES.USER_TALKING) {
    toState(STATES.AI_THINKING);
    return;
  }
  if (currentState === STATES.AI_THINKING || currentState === STATES.AI_TALKING) {
    toState(STATES.IDLE);
    return;
  }
});

// 静音 / 取消静音（长按麦克风）
let micHold = null;
btnMic.addEventListener('mousedown', ()=>{
  micHold = setTimeout(()=>{
    isMuted = !isMuted;
    if (isMuted) {
      btnMic.classList.add('muted');
      btnMic.innerHTML = `<svg viewBox="0 0 24 24" style="stroke:#e0002a">
        <path d="M12 1a3 3 0 013 3v8a3 3 0 01-6 0V4a3 3 0 013-3z"/>
        <path d="M19 10v2a7 7 0 01-14 0v-2"/>
        <line x1="12" y1="19" x2="12" y2="23"/>
        <line x1="8" y1="23" x2="16" y2="23"/>
        <line x1="4" y1="4" x2="20" y2="20" stroke="#e0002a"/>
      </svg>`;
    } else {
      btnMic.classList.remove('muted');
      btnMic.innerHTML = `<svg viewBox="0 0 24 24">
        <path d="M12 1a3 3 0 013 3v8a3 3 0 01-6 0V4a3 3 0 013-3z"/>
        <path d="M19 10v2a7 7 0 01-14 0v-2"/>
        <line x1="12" y1="19" x2="12" y2="23"/>
        <line x1="8" y1="23" x2="16" y2="23"/>
      </svg>`;
    }
    hint(isMuted ? '🔇 已静音（长按切换）' : '🎙️ 已取消静音');
  }, 600);
});
btnMic.addEventListener('mouseup', ()=>clearTimeout(micHold));
btnMic.addEventListener('mouseleave', ()=>clearTimeout(micHold));
// 移动端
btnMic.addEventListener('touchstart', (e)=>{
  e.preventDefault();
  micHold = setTimeout(()=>{
    isMuted = !isMuted;
    btnMic.classList.toggle('muted', isMuted);
    hint(isMuted ? '🔇 已静音' : '🎙️ 已取消静音');
  }, 600);
});
btnMic.addEventListener('touchend', ()=>clearTimeout(micHold));

// 摄像头按钮：显示上传面板
btnCamera.addEventListener('click', ()=>{
  if (currentState === STATES.USER_TALKING) {
    uploadPanel.classList.toggle('visible');
  } else {
    hint('请先开始说话');
  }
});

// 关闭按钮：回到未连接
btnClose.addEventListener('click', ()=>{
  toState(STATES.DISCONNECTED);
  isMuted = false;
  btnMic.classList.remove('muted');
});

// 跳过按钮
skipBtn.addEventListener('click', ()=>{
  toState(STATES.IDLE);
  replyText.textContent = '';
});

// 点击球体快速演示下一步
document.getElementById('sphereWrap').addEventListener('click', ()=>{
  const map = {
    [STATES.DISCONNECTED]: STATES.CONNECTING,
    [STATES.CONNECTING]:   STATES.IDLE,
    [STATES.IDLE]:         STATES.USER_TALKING,
    [STATES.USER_TALKING]: STATES.AI_THINKING,
    [STATES.AI_THINKING]:  STATES.AI_TALKING,
    [STATES.AI_TALKING]:   STATES.IDLE,
  };
  if (map[currentState]) toState(map[currentState]);
});

// ── 启动 ──
updatePseudoGradient(false);
toState(STATES.DISCONNECTED);
