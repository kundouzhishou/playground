<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>小金语音助手</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #13131c;
      --surface2: #1c1c2e;
      --border: #2a2a40;
      --accent: #7b5fff;
      --accent2: #ff6fd8;
      --gold: #ffd166;
      --text: #e8e8f0;
      --subtext: #8888aa;
      --danger: #ff4d6d;
      --radius: 20px;
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      overflow: hidden;
      user-select: none;
    }

    /* ───── LAYOUT ───── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 480px;
      margin: 0 auto;
      position: relative;
    }

    /* ───── TOP BAR ───── */
    #topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 20px 12px;
      flex-shrink: 0;
    }
    #topbar .left {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      box-shadow: 0 0 12px rgba(123,95,255,.5);
    }
    .agent-name {
      font-size: 17px;
      font-weight: 600;
      background: linear-gradient(90deg, var(--gold), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    #topbar .right {
      display: flex; align-items: center; gap: 14px;
    }
    .icon-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--subtext);
      border-radius: 10px;
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      font-size: 14px;
      transition: all .2s;
    }
    .icon-btn:hover { border-color: var(--accent); color: var(--text); }
    .icon-btn.active {
      background: rgba(123,95,255,.18);
      border-color: var(--accent);
      color: var(--accent);
    }
    .cc-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .5px;
    }

    /* ───── STATUS BADGE ───── */
    #status-bar {
      text-align: center;
      padding: 4px 0 8px;
      flex-shrink: 0;
    }
    #status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 99px;
      padding: 4px 14px;
      font-size: 12px;
      color: var(--subtext);
      transition: all .3s;
    }
    #status-badge .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--subtext);
      transition: background .3s;
    }
    #status-badge.idle .dot   { background: #44dd88; animation: pulse-dot 2s ease-in-out infinite; }
    #status-badge.recording .dot { background: #ff4d6d; animation: blink 1s step-start infinite; }
    #status-badge.thinking .dot  { background: var(--accent); animation: spin-dot 1s linear infinite; }
    #status-badge.speaking .dot  { background: var(--gold); animation: pulse-dot 1s ease-in-out infinite; }

    @keyframes pulse-dot { 0%,100%{opacity:1}50%{opacity:.3} }
    @keyframes blink { 0%,100%{opacity:1}50%{opacity:0} }
    @keyframes spin-dot { 0%{box-shadow:3px 0 0 rgba(123,95,255,.8)}25%{box-shadow:0 3px 0 rgba(123,95,255,.8)}50%{box-shadow:-3px 0 0 rgba(123,95,255,.8)}75%{box-shadow:0 -3px 0 rgba(123,95,255,.8)} }

    /* ───── CANVAS AREA ───── */
    #canvas-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      min-height: 0;
    }
    #anim-canvas {
      display: block;
    }

    /* ───── SUBTITLE ───── */
    #subtitle-wrap {
      flex-shrink: 0;
      min-height: 80px;
      max-height: 130px;
      overflow-y: auto;
      padding: 0 20px 8px;
      scroll-behavior: smooth;
    }
    #subtitle-wrap::-webkit-scrollbar { width: 3px; }
    #subtitle-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .chat-bubble {
      display: flex;
      gap: 10px;
      margin-bottom: 8px;
      animation: fadeUp .3s ease;
    }
    .chat-bubble.user { flex-direction: row-reverse; }
    .bubble-body {
      max-width: 75%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 8px 12px;
      font-size: 13px;
      line-height: 1.5;
      color: var(--text);
    }
    .chat-bubble.user .bubble-body {
      background: rgba(123,95,255,.18);
      border-color: rgba(123,95,255,.35);
    }
    .bubble-icon {
      width: 28px; height: 28px; border-radius: 50%;
      background: var(--surface2);
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; flex-shrink: 0; margin-top: 2px;
    }
    @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

    /* ───── BOTTOM BAR ───── */
    #bottom-bar {
      flex-shrink: 0;
      padding: 12px 20px 28px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* Recording waveform strip */
    #wave-strip {
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 3px;
      opacity: 0;
      transition: opacity .3s;
    }
    #wave-strip.visible { opacity: 1; }
    .wave-bar {
      width: 3px;
      background: var(--danger);
      border-radius: 2px;
      animation: wave-anim 0.8s ease-in-out infinite;
    }

    /* Controls row */
    #controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .ctrl-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      cursor: pointer;
      transition: all .2s;
      flex: 1;
    }
    .ctrl-btn:hover .btn-icon { transform: scale(1.08); }
    .ctrl-btn:active .btn-icon { transform: scale(.95); }

    .btn-icon {
      width: 52px; height: 52px;
      border-radius: 50%;
      background: var(--surface2);
      border: 1.5px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      transition: all .25s;
    }
    .btn-label {
      font-size: 11px;
      color: var(--subtext);
      transition: color .2s;
    }

    /* Mic button — large */
    #mic-btn .btn-icon {
      width: 68px; height: 68px;
      font-size: 28px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      box-shadow: 0 0 22px rgba(123,95,255,.55);
    }
    #mic-btn.recording .btn-icon {
      background: linear-gradient(135deg, #ff4d6d, #ff9a3c);
      box-shadow: 0 0 28px rgba(255,77,109,.6);
      animation: mic-pulse 1.5s ease-in-out infinite;
    }
    #mic-btn .btn-label { color: var(--text); font-size: 12px; font-weight: 500; }

    @keyframes mic-pulse {
      0%,100%{box-shadow:0 0 22px rgba(255,77,109,.5)}
      50%{box-shadow:0 0 40px rgba(255,77,109,.9)}
    }

    /* Mute button */
    #mute-btn.muted .btn-icon {
      background: rgba(255,77,109,.15);
      border-color: var(--danger);
      color: var(--danger);
    }
    #mute-btn.muted .btn-label { color: var(--danger); }

    /* End button */
    #end-btn .btn-icon {
      background: rgba(255,77,109,.12);
      border-color: rgba(255,77,109,.3);
      color: var(--danger);
    }
    #end-btn:hover .btn-icon { background: rgba(255,77,109,.25); }

    /* ───── ENDED OVERLAY ───── */
    #ended-overlay {
      position: absolute; inset: 0;
      background: rgba(10,10,15,.92);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      z-index: 100;
    }
    #ended-overlay.visible { display: flex; animation: fadeIn .4s ease; }
    @keyframes fadeIn { from{opacity:0} to{opacity:1} }
    .ended-icon { font-size: 52px; }
    .ended-title { font-size: 22px; font-weight: 600; color: var(--text); }
    .ended-sub { font-size: 14px; color: var(--subtext); }
    .restart-btn {
      margin-top: 8px;
      padding: 12px 32px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 99px;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 0 18px rgba(123,95,255,.4);
      transition: all .2s;
    }
    .restart-btn:hover { transform: scale(1.04); }

    /* ───── SETTINGS PANEL ───── */
    #settings-panel {
      position: absolute;
      top: 64px; right: 16px;
      width: 220px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
      display: none;
      flex-direction: column;
      gap: 14px;
      z-index: 50;
      box-shadow: 0 8px 32px rgba(0,0,0,.5);
      animation: slideDown .2s ease;
    }
    #settings-panel.visible { display: flex; }
    @keyframes slideDown { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:translateY(0)} }
    .setting-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 13px;
    }
    .setting-label { color: var(--subtext); }
    .toggle {
      width: 36px; height: 20px;
      background: var(--border);
      border-radius: 99px;
      position: relative;
      cursor: pointer;
      transition: background .2s;
    }
    .toggle.on { background: var(--accent); }
    .toggle::after {
      content: '';
      position: absolute;
      top: 3px; left: 3px;
      width: 14px; height: 14px;
      border-radius: 50%;
      background: #fff;
      transition: left .2s;
    }
    .toggle.on::after { left: 19px; }
    .settings-title { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
    .settings-sep { height: 1px; background: var(--border); }
  </style>
</head>
<body>
<div id="app">

  <!-- TOP BAR -->
  <div id="topbar">
    <div class="left">
      <div class="avatar">🤖</div>
      <span class="agent-name">小金助手</span>
    </div>
    <div class="right">
      <div class="icon-btn active" id="cc-btn" title="字幕开关">
        <span class="cc-label">CC</span>
      </div>
      <div class="icon-btn" id="settings-btn" title="设置">⚙️</div>
    </div>
  </div>

  <!-- SETTINGS PANEL -->
  <div id="settings-panel">
    <div class="settings-title">设置</div>
    <div class="settings-sep"></div>
    <div class="setting-row">
      <span class="setting-label">字幕显示</span>
      <div class="toggle on" id="toggle-cc"></div>
    </div>
    <div class="setting-row">
      <span class="setting-label">降噪模式</span>
      <div class="toggle on" id="toggle-denoise"></div>
    </div>
    <div class="setting-row">
      <span class="setting-label">自动结束</span>
      <div class="toggle" id="toggle-auto"></div>
    </div>
    <div class="setting-row">
      <span class="setting-label">唤醒词检测</span>
      <div class="toggle on" id="toggle-wake"></div>
    </div>
  </div>

  <!-- STATUS -->
  <div id="status-bar">
    <div id="status-badge" class="idle">
      <div class="dot"></div>
      <span id="status-text">待机中</span>
    </div>
  </div>

  <!-- ANIMATION CANVAS -->
  <div id="canvas-wrap">
    <canvas id="anim-canvas"></canvas>
  </div>

  <!-- SUBTITLE / CHAT -->
  <div id="subtitle-wrap" id="subtitle-area">
    <div class="chat-bubble" id="mock-1">
      <div class="bubble-icon">🤖</div>
      <div class="bubble-body">你好！我是小金，今天有什么可以帮你的？</div>
    </div>
    <div class="chat-bubble user" id="mock-2">
      <div class="bubble-icon">🙂</div>
      <div class="bubble-body">帮我查一下明天北京的天气</div>
    </div>
    <div class="chat-bubble" id="mock-3">
      <div class="bubble-icon">🤖</div>
      <div class="bubble-body">好的，正在为你查询北京明天的天气……</div>
    </div>
  </div>

  <!-- WAVE STRIP -->
  <div id="wave-strip">
  </div>

  <!-- BOTTOM CONTROLS -->
  <div id="bottom-bar">
    <div id="controls">
      <div class="ctrl-btn" id="photo-btn">
        <div class="btn-icon">📷</div>
        <span class="btn-label">拍照/上传</span>
      </div>
      <div class="ctrl-btn" id="mic-btn">
        <div class="btn-icon">🎙️</div>
        <span class="btn-label">开始说话</span>
      </div>
      <div class="ctrl-btn" id="mute-btn">
        <div class="btn-icon">🔇</div>
        <span class="btn-label">静音</span>
      </div>
      <div class="ctrl-btn" id="end-btn">
        <div class="btn-icon">✕</div>
        <span class="btn-label">结束通话</span>
      </div>
    </div>
  </div>

  <!-- ENDED OVERLAY -->
  <div id="ended-overlay">
    <div class="ended-icon">👋</div>
    <div class="ended-title">通话已结束</div>
    <div class="ended-sub">感谢使用小金语音助手</div>
    <button class="restart-btn" id="restart-btn">重新开始</button>
  </div>

</div>

<script>
/* ========== STATE ========== */
const STATES = ['idle','recording','thinking','speaking'];
let state = 'idle';
let ccOn = true;
let muted = false;
let settingsOpen = false;
let animFrame;
let waveTimers = [];

/* ========== ELEMENTS ========== */
const canvas   = document.getElementById('anim-canvas');
const ctx      = canvas.getContext('2d');
const wrap     = document.getElementById('canvas-wrap');
const badge    = document.getElementById('status-badge');
const statusTx = document.getElementById('status-text');
const micBtn   = document.getElementById('mic-btn');
const muteBtn  = document.getElementById('mute-btn');
const endBtn   = document.getElementById('end-btn');
const photoBtn = document.getElementById('photo-btn');
const ccBtn    = document.getElementById('cc-btn');
const settingsBtn = document.getElementById('settings-btn');
const settingsPanel = document.getElementById('settings-panel');
const waveStrip    = document.getElementById('wave-strip');
const subtitleWrap = document.getElementById('subtitle-wrap');
const endedOverlay = document.getElementById('ended-overlay');
const restartBtn   = document.getElementById('restart-btn');

/* ========== CANVAS SIZE ========== */
function resizeCanvas() {
  const w = wrap.clientWidth;
  const h = wrap.clientHeight;
  canvas.width  = w * devicePixelRatio;
  canvas.height = h * devicePixelRatio;
  canvas.style.width  = w + 'px';
  canvas.style.height = h + 'px';
  ctx.scale(devicePixelRatio, devicePixelRatio);
}
window.addEventListener('resize', () => { resizeCanvas(); });
resizeCanvas();

/* ========== ANIMATION ========== */
let t = 0;
const particles = Array.from({length: 60}, () => ({
  angle: Math.random() * Math.PI * 2,
  r: 60 + Math.random() * 50,
  speed: (Math.random() - .5) * .018 + .008,
  size: 1.5 + Math.random() * 2.5,
  alpha: .3 + Math.random() * .5,
}));

function draw() {
  const W = canvas.width  / devicePixelRatio;
  const H = canvas.height / devicePixelRatio;
  const cx = W / 2, cy = H / 2;
  ctx.clearRect(0, 0, W, H);
  t += .016;

  if (state === 'idle')      drawIdle(cx, cy, t);
  else if (state === 'recording') drawRecording(cx, cy, t);
  else if (state === 'thinking')  drawThinking(cx, cy, t);
  else if (state === 'speaking')  drawSpeaking(cx, cy, t);

  animFrame = requestAnimationFrame(draw);
}

/* ── IDLE: breathing halo ── */
function drawIdle(cx, cy, t) {
  const breath = Math.sin(t * 1.2) * .5 + .5; // 0-1
  const r1 = 60 + breath * 8;
  const r2 = r1 + 20 + breath * 12;
  const r3 = r2 + 20 + breath * 8;

  // outer glow rings
  [r3, r2, r1].forEach((r, i) => {
    const alpha = [.06, .12, .22][i] * (0.7 + 0.3 * breath);
    const g = ctx.createRadialGradient(cx, cy, r*.6, cx, cy, r);
    g.addColorStop(0, `rgba(123,95,255,${alpha})`);
    g.addColorStop(1, 'rgba(123,95,255,0)');
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI*2);
    ctx.fillStyle = g;
    ctx.fill();
  });

  // core circle
  const core = ctx.createRadialGradient(cx, cy, 0, cx, cy, r1);
  core.addColorStop(0, `rgba(255,209,102,${.85 + .15*breath})`);
  core.addColorStop(.5, `rgba(123,95,255,${.7 + .15*breath})`);
  core.addColorStop(1, 'rgba(123,95,255,0)');
  ctx.beginPath();
  ctx.arc(cx, cy, r1, 0, Math.PI*2);
  ctx.fillStyle = core;
  ctx.fill();

  // center emoji placeholder
  ctx.font = `${28 + breath*4}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.globalAlpha = .9 + .1*breath;
  ctx.fillText('🤖', cx, cy);
  ctx.globalAlpha = 1;
}

/* ── RECORDING: soundwave bars ── */
function drawRecording(cx, cy, t) {
  const bars = 28;
  const barW = 4;
  const gap  = 5;
  const totalW = bars * (barW + gap) - gap;
  const startX = cx - totalW / 2;

  // Background glow
  const g = ctx.createRadialGradient(cx, cy, 10, cx, cy, 90);
  g.addColorStop(0, 'rgba(255,77,109,.15)');
  g.addColorStop(1, 'rgba(255,77,109,0)');
  ctx.beginPath();
  ctx.arc(cx, cy, 90, 0, Math.PI*2);
  ctx.fillStyle = g;
  ctx.fill();

  for (let i = 0; i < bars; i++) {
    const phase = t * 8 + i * .55;
    const h = 10 + Math.abs(Math.sin(phase)) * 55 + Math.abs(Math.sin(phase * .7)) * 20;
    const x = startX + i * (barW + gap);
    const y = cy - h / 2;
    const alpha = .6 + .4 * Math.abs(Math.sin(phase));
    ctx.fillStyle = `rgba(255,77,109,${alpha})`;
    ctx.beginPath();
    ctx.roundRect(x, y, barW, h, barW/2);
    ctx.fill();
  }

  ctx.font = '13px sans-serif';
  ctx.fillStyle = 'rgba(255,77,109,.8)';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('🎙 正在录音…', cx, cy + 72);
}

/* ── THINKING: orbiting particles ── */
function drawThinking(cx, cy, t) {
  // Orbit rings (faint)
  [55, 80, 105].forEach((r, ri) => {
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI*2);
    ctx.strokeStyle = `rgba(123,95,255,${.08 + ri*.04})`;
    ctx.lineWidth = 1;
    ctx.stroke();
  });

  // Core
  const pulse = Math.sin(t*3)*.5+.5;
  const core = ctx.createRadialGradient(cx, cy, 0, cx, cy, 38 + pulse*6);
  core.addColorStop(0, 'rgba(123,95,255,.9)');
  core.addColorStop(1, 'rgba(123,95,255,0)');
  ctx.beginPath();
  ctx.arc(cx, cy, 38 + pulse*6, 0, Math.PI*2);
  ctx.fillStyle = core;
  ctx.fill();

  // Particles
  particles.forEach((p, i) => {
    p.angle += p.speed * (i % 2 === 0 ? 1 : -1);
    const x = cx + Math.cos(p.angle) * p.r;
    const y = cy + Math.sin(p.angle) * p.r;
    const flicker = Math.abs(Math.sin(t * 2.5 + i));
    ctx.beginPath();
    ctx.arc(x, y, p.size, 0, Math.PI*2);
    ctx.fillStyle = `rgba(${i%2?'255,111,216':'123,95,255'},${p.alpha * flicker})`;
    ctx.fill();
  });

  ctx.font = '13px sans-serif';
  ctx.fillStyle = 'rgba(200,200,255,.75)';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('💭 思考中…', cx, cy + 120);
}

/* ── SPEAKING: waveform ── */
function drawSpeaking(cx, cy, t) {
  // Glow
  const g = ctx.createRadialGradient(cx, cy, 10, cx, cy, 100);
  g.addColorStop(0, 'rgba(255,209,102,.18)');
  g.addColorStop(1, 'rgba(255,209,102,0)');
  ctx.beginPath();
  ctx.arc(cx, cy, 100, 0, Math.PI*2);
  ctx.fillStyle = g;
  ctx.fill();

  // Sine wave
  const pts = 200;
  const waveW = 220;
  const amp = 32;
  const startX = cx - waveW/2;

  ctx.beginPath();
  for (let i = 0; i <= pts; i++) {
    const x = startX + (waveW / pts) * i;
    const prog = i / pts;
    const envelope = Math.sin(prog * Math.PI);
    const y = cy + Math.sin(prog * Math.PI * 6 + t * 7) * amp * envelope;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.strokeStyle = 'rgba(255,209,102,.85)';
  ctx.lineWidth = 3;
  ctx.lineJoin = 'round';
  ctx.stroke();

  // Second wave (accent)
  ctx.beginPath();
  for (let i = 0; i <= pts; i++) {
    const x = startX + (waveW / pts) * i;
    const prog = i / pts;
    const envelope = Math.sin(prog * Math.PI);
    const y = cy + Math.sin(prog * Math.PI * 5 + t * 5 + 1.2) * (amp*.6) * envelope;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.strokeStyle = 'rgba(255,111,216,.5)';
  ctx.lineWidth = 2;
  ctx.stroke();

  ctx.font = '13px sans-serif';
  ctx.fillStyle = 'rgba(255,209,102,.8)';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('🔊 正在播放…', cx, cy + 72);
}

/* ========== STATE MACHINE ========== */
const stateConfig = {
  idle:      { label: '待机中',   micLabel: '开始说话', badgeClass: 'idle'      },
  recording: { label: '正在录音', micLabel: '停止录音', badgeClass: 'recording' },
  thinking:  { label: '思考中',   micLabel: '开始说话', badgeClass: 'thinking'  },
  speaking:  { label: '正在回答', micLabel: '开始说话', badgeClass: 'speaking'  },
};

function setState(s) {
  state = s;
  const cfg = stateConfig[s];
  badge.className = 'idle'; // reset
  requestAnimationFrame(() => badge.className = cfg.badgeClass);
  statusTx.textContent = cfg.label;
  micBtn.querySelector('.btn-label').textContent = cfg.micLabel;
  micBtn.classList.toggle('recording', s === 'recording');
  waveStrip.classList.toggle('visible', s === 'recording');
}

/* ========== WAVE STRIP BARS ========== */
(function buildWaveStrip() {
  waveStrip.innerHTML = '';
  for (let i = 0; i < 22; i++) {
    const bar = document.createElement('div');
    bar.className = 'wave-bar';
    const delay = (i * 0.07).toFixed(2);
    const dur   = (.5 + Math.random() * .6).toFixed(2);
    const h     = 8 + Math.round(Math.random() * 22);
    bar.style.cssText = `height:${h}px;animation-duration:${dur}s;animation-delay:-${delay}s;`;
    waveStrip.appendChild(bar);
  }
})();

const waveAnim = document.createElement('style');
waveAnim.textContent = `@keyframes wave-anim{0%,100%{transform:scaleY(1)}50%{transform:scaleY(2.5)}}`;
document.head.appendChild(waveAnim);

/* ========== MOCK DIALOGUE FLOW ========== */
const dialogQueue = [
  { role: 'user',  text: '今天有哪些重要的新闻？' },
  { role: 'agent', text: '今天的头条：1) 人工智能监管新规发布；2) 全国多地迎来降温天气；3) 神舟载人飞船顺利对接空间站。你想了解哪条？' },
  { role: 'user',  text: '给我讲讲 AI 监管的内容' },
  { role: 'agent', text: '好的！国家互联网信息办公室今日发布《生成式人工智能服务管理暂行办法》修订草案，重点强调数据安全与内容合规，向社会公开征求意见。' },
];
let dialogIdx = 0;

function addBubble(role, text) {
  if (!ccOn) return;
  const div = document.createElement('div');
  div.className = 'chat-bubble' + (role === 'user' ? ' user' : '');
  div.innerHTML = `
    <div class="bubble-icon">${role === 'user' ? '🙂' : '🤖'}</div>
    <div class="bubble-body">${text}</div>`;
  subtitleWrap.appendChild(div);
  subtitleWrap.scrollTop = subtitleWrap.scrollHeight;
}

function runDialogCycle() {
  if (dialogIdx >= dialogQueue.length) { dialogIdx = 0; }
  const d = dialogQueue[dialogIdx++];
  if (d.role === 'user') {
    setState('recording');
    setTimeout(() => {
      addBubble('user', d.text);
      setState('thinking');
      setTimeout(() => {
        runDialogCycle(); // agent reply
      }, 1800);
    }, 2200);
  } else {
    setState('speaking');
    addBubble('agent', d.text);
    setTimeout(() => {
      setState('idle');
    }, 3500);
  }
}

/* ========== CONTROLS ========== */
micBtn.addEventListener('click', () => {
  if (state === 'idle') {
    runDialogCycle();
  } else if (state === 'recording') {
    setState('thinking');
    setTimeout(() => setState('idle'), 2000);
  }
});

muteBtn.addEventListener('click', () => {
  muted = !muted;
  muteBtn.classList.toggle('muted', muted);
  muteBtn.querySelector('.btn-label').textContent = muted ? '已静音' : '静音';
});

endBtn.addEventListener('click', () => {
  cancelAnimationFrame(animFrame);
  endedOverlay.classList.add('visible');
});

restartBtn.addEventListener('click', () => {
  endedOverlay.classList.remove('visible');
  setState('idle');
  draw();
});

photoBtn.addEventListener('click', () => {
  addBubble('user', '📷 [图片已上传]');
  setState('thinking');
  setTimeout(() => {
    addBubble('agent', '我看到了这张图片，请问你想了解什么？');
    setState('speaking');
    setTimeout(() => setState('idle'), 2000);
  }, 1800);
});

/* ── CC button ── */
ccBtn.addEventListener('click', () => {
  ccOn = !ccOn;
  ccBtn.classList.toggle('active', ccOn);
  subtitleWrap.style.display = ccOn ? '' : 'none';
  // sync panel toggle
  document.getElementById('toggle-cc').classList.toggle('on', ccOn);
});

/* ── Settings ── */
settingsBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  settingsOpen = !settingsOpen;
  settingsPanel.classList.toggle('visible', settingsOpen);
  settingsBtn.classList.toggle('active', settingsOpen);
});
document.addEventListener('click', () => {
  if (settingsOpen) {
    settingsOpen = false;
    settingsPanel.classList.remove('visible');
    settingsBtn.classList.remove('active');
  }
});
settingsPanel.addEventListener('click', e => e.stopPropagation());

// Toggles in settings panel
['toggle-cc','toggle-denoise','toggle-auto','toggle-wake'].forEach(id => {
  document.getElementById(id).addEventListener('click', function() {
    this.classList.toggle('on');
    if (id === 'toggle-cc') {
      ccOn = this.classList.contains('on');
      ccBtn.classList.toggle('active', ccOn);
      subtitleWrap.style.display = ccOn ? '' : 'none';
    }
  });
});

/* ========== DEMO AUTO-CYCLE ========== */
// Auto start after 1 second
setTimeout(() => { runDialogCycle(); }, 1200);

/* ========== START ========== */
draw();
</script>
</body>
</html>
